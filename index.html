  <style>

    body.light{--bg-1:#f8fafc;--bg-2:#e2e8f0;--surface:rgba(255,255,255,.9);--stroke:rgba(15,23,42,.16);--text:#0f172a;--muted:#334155;--accent:#4f46e5;--accent-2:#0891b2;--danger:#dc2626;--ok:#16a34a}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:radial-gradient(1000px 500px at 10% -10%,rgba(124,58,237,.3),transparent 55%),radial-gradient(900px 500px at 100% -20%,rgba(6,182,212,.25),transparent 60%),linear-gradient(180deg,var(--bg-2),var(--bg-1));min-height:100vh;padding:clamp(12px,2.4vw,26px)}

    .card{background:var(--surface);backdrop-filter:blur(14px);border:1px solid var(--stroke);border-radius:16px;padding:clamp(12px,1.6vw,16px);margin-bottom:12px;box-shadow:0 10px 40px rgba(0,0,0,.28);animation:fadeIn .35s ease both}

    .searchWrap{position:relative}.searchWrap input{padding-left:36px;margin:0}.searchWrap:before{content:'🔎';position:absolute;left:11px;top:8px;opacity:.65}

    .commentDeleteText:hover{color:var(--danger)}
    .commentsHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .commentsTitle{font-size:22px;font-weight:700}
    .activityTabs{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    .activityTab{padding:6px 10px;border-radius:8px;border:1px solid var(--stroke);background:transparent;color:var(--text);cursor:pointer}
    .activityTab.active{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.45)}
    .commentComposer{margin-top:10px;border:1px solid var(--stroke);border-radius:12px;padding:10px;background:rgba(2,6,23,.25)}

    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;inset:0;background:#64748b;border-radius:999px;transition:.2s}
    .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
    .switch input:checked + .slider{background:#2563eb}
    .switch input:checked + .slider:before{transform:translateX(18px)}
    .commentAvatar{width:28px;height:28px;border-radius:999px;object-fit:cover;border:1px solid var(--stroke);margin-right:8px}

    .internalBadge{font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(250,204,21,.25);color:#fef08a;border:1px solid rgba(250,204,21,.6);margin-left:8px}
    .attachBtn{width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;padding:0;font-size:16px}
    .attachInput{display:none}

    .colorBtn{width:34px;height:30px;border-radius:8px;border:1px solid var(--stroke);display:inline-flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#ef4444,#f59e0b,#22c55e,#3b82f6,#8b5cf6)}

    .codeBadge{display:inline-block;background:rgba(59,130,246,.2);color:#bfdbfe;padding:6px 10px;border-radius:10px;font-weight:700;border:1px solid rgba(59,130,246,.45)}
    @media (min-width:980px){.detailLayout.withSidebar{grid-template-columns:1.55fr .55fr}.detailSidebar{border-left:1px solid rgba(148,163,184,.25);padding-left:12px}}
    body.light .ticket,body.light .column,body.light .feedItem,body.light .commentItem{background:#ffffff;color:#0f172a;border-color:#64748b;box-shadow:0 8px 20px rgba(15,23,42,.10)}

    body.light input,body.light select,body.light textarea{background:#fff;color:#0f172a;border-color:#94a3b8}
    body.light .column h4{color:#0f172a}
    body.light .detailSidebar{background:#eaf2ff;border-radius:12px;padding:12px}
    body.light .codeBadge{background:#1e3a8a;color:#ffffff;border-color:#1e40af}

    .boardWrap{overflow-x:auto;overflow-y:visible;padding-bottom:4px}
    .board{display:grid;grid-template-columns:repeat(5,minmax(260px,1fr));gap:12px;overflow:visible;align-items:start}
    .column{background:rgba(2,6,23,.35);border:1px solid var(--stroke);border-radius:12px;padding:10px;min-height:220px;height:100%;display:flex;flex-direction:column}
    .column h4{margin:4px 0 10px;font-size:14px;text-transform:uppercase;color:#cbd5e1;letter-spacing:.3px}
    .ticket{background:rgba(15,23,42,.8);border:1px solid rgba(148,163,184,.2);border-radius:10px;padding:10px;margin-bottom:8px;border-left:5px solid rgba(148,163,184,.45)}
    .ticket.priorityAlta{border-left-color:#ef4444}
    .ticket.priorityMedia{border-left-color:#f59e0b}
    .ticket.priorityBaja{border-left-color:#22c55e}
    .ticket h5{margin:0 0 8px;font-size:14px}
    .ticketCode{font-size:11px;color:#94a3b8;font-weight:600;margin-right:6px}
    .deadline{color:#f87171}
    .ticket p{margin:0 0 8px;font-size:13px;color:#cbd5e1}
    .ticket .meta{font-size:11px;color:var(--muted)}
    .modalBack{position:fixed;inset:0;background:rgba(2,6,23,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:99}
    .modal{width:min(1120px,100%);max-height:90vh;overflow:auto}
    .hidden{display:none!important}
    .urgentBtn{background:linear-gradient(135deg,#f59e0b,#ef4444);box-shadow:0 6px 18px rgba(239,68,68,.35)}
    .urgentFlag{font-size:11px;color:#fecaca;margin-top:6px}
    .toast{position:fixed;right:16px;bottom:16px;z-index:120;min-width:260px;max-width:420px;padding:10px 12px;border-radius:10px;border:1px solid var(--stroke);background:rgba(15,23,42,.95);box-shadow:0 8px 24px rgba(0,0,0,.35);font-size:13px}
    .toast.ok{border-color:rgba(22,163,74,.65)}
    .toast.error{border-color:rgba(220,38,38,.65)}
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <div id="ticketModal" class="modalBack hidden">
    <div class="card modal">
      <div class="inline" style="justify-content:space-between;margin-bottom:8px">
        <h3 style="margin:0">Nuevo ticket</h3>
        <button class="secondary" onclick="closeTicketModal()">Cerrar</button>
      </div>

      <div class="row">
        <div><label>Título</label><input id="tTitle" /></div>
        <div><label>Prioridad</label><select id="tPriority"><option value="Baja">Baja</option><option value="Media">Media</option><option value="Alta">Alta</option></select></div>
      </div>
      <div><label>Detalle</label><textarea id="tDescription"></textarea></div>
      <div class="row">
        <div><label>Cliente/Área</label><select id="tClient"></select></div>
        <div><label>Deadline</label><input id="tDeadline" type="date" onkeydown="return false" onfocus="this.showPicker && this.showPicker()" /></div>
        <div><label>Informador</label><select id="tInformer"></select></div>
      </div>

      <div class="inline" style="justify-content:flex-end">
        <button onclick="saveTicket()">Crear ticket</button>
        <button class="secondary" onclick="closeTicketModal()">Cancelar</button>
      </div>
    </div>
  </div>

    <div class="card modal">
      <div class="inline" style="justify-content:space-between;margin-bottom:8px">
        <h3 id="ticketDetailTitle" style="margin:0">Detalle del ticket</h3>
        <div class="inline" style="gap:8px;align-items:center">
          <div id="ticketDetailHeaderControls"></div>
          <button class="secondary" onclick="closeTicketDetailModal()">Cerrar</button>
        </div>
      </div>
      <div id="ticketDetailContent"></div>
    </div>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA4-yTeI0CemnlROxF9hIgj_HxiDLvYZTY",
      authDomain: "tablero-a0658.firebaseapp.com",
      databaseURL: "https://tablero-a0658-default-rtdb.firebaseio.com",
      projectId: "tablero-a0658",

      messagingSenderId: "1018762078941",
      appId: "1:1018762078941:web:785861e9f2ddb843b88934"
    })

    const db = firebase.database()
    const DEFAULT_USERS = [
      { email: "admin@tablero.local", password: "1234", role: "admin" },
      { email: "consultor@tablero.local", password: "1234", role: "consultor" },
      { email: "analista@tablero.local", password: "1234", role: "analista" }
    ]

    var currentUser = globalThis.currentUser || null
    var currentRole = globalThis.currentRole || null
    var ticketSearchTerm = globalThis.ticketSearchTerm || ""
    var ticketFilterClient = globalThis.ticketFilterClient || ""
    var cachedClients = globalThis.cachedClients || []
    var consultorRefreshTimer = globalThis.consultorRefreshTimer || null
    var loginInProgress = false
    var uiTheme = localStorage.getItem("uiTheme") || "dark"
    var adminPanelTab = "panel"
    var analystActivityTab = "comments"
    var ticketFilterAnalyst = ""
    var commentSortOrderByTicket = {}
    var ticketActivityTabById = {}
    var cachedUsersByEmail = {}
    var draggedTicketId = ""
    var ticketTimerIntervals = {}

    const STATUS = {
      unassigned: "Pendientes de asignar",
      todo: "Por hacer",
      doing: "En curso",
      recurrent: "Recurrente",
      done: "Finalizadas"
    }

    const SHEET_ID = "1tNNtG2Asr1ds1_-3P6PmVgsHbdlhhfrV7GhWJDiTO1Q"
    const SHEET_GID = "0"
    const SHEET_TICKETS_NAME = "BD"
    const SHEET_ADMINS_NAME = "BD_ADMINS"
    // Reemplazar por tu URL de Web App de Apps Script para habilitar escritura en la hoja.
    // Debe aceptar JSON { action, payload } para createTicket/updateTicket/deleteTicket.
    const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwUyvGndwr5K7uhvgNyC_CBGt8FI6JlW62GExQsl5sxvGIYv_mHBKxotgDgaEN7EmFTwA/exec"
    const DRIVE_FOLDER_ID = "1IZ0GHXqSQzbHLnBmSAitnah3xDq8vy94"
    let cachedTickets = []

    function emailKey(email){ return (email||"").toLowerCase().replace(/[.#$/\[\]]/g, "_") }
    function htmlEscape(v){ return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;") }
    function generateId(){ return (crypto?.randomUUID?.() || `tk_${Date.now()}_${Math.random().toString(36).slice(2,8)}`) }
    function parseGvizJson(text){
      const raw = text.replace(/^\/\/O_o\s*\n/, "")
      const start = raw.indexOf("{")
      const end = raw.lastIndexOf("}")
      return JSON.parse(raw.slice(start, end + 1))
    }

    function parseCommentsValue(value){
      if(!value) return {}
      if(typeof value === "object") return value
      if(typeof value !== "string") return {}
      try{ return JSON.parse(value) }catch(_){ return {} }
    }

    function priorityClass(priority){
      const p = String(priority||"Media").toLowerCase()
      if(p === "alta") return "priorityAlta"
      if(p === "baja") return "priorityBaja"
      return "priorityMedia"
    }

    function applyTheme(){
      document.body.classList.toggle("light", uiTheme === "light")
    }

    function toggleTheme(){
      uiTheme = uiTheme === "light" ? "dark" : "light"
      localStorage.setItem("uiTheme", uiTheme)
      applyTheme()
      const btn = document.getElementById("themeToggleBtn")
      if(btn) btn.textContent = uiTheme === "light" ? "🌙 Modo oscuro" : "☀️ Modo claro"
    }

    function setAdminTab(tab){
      adminPanelTab = tab
      renderApp()
    }


    function formatAgo(iso){
      if(!iso) return ""
      const ms = Date.now() - new Date(iso).getTime()
      const mins = Math.max(1, Math.floor(ms/60000))
      if(mins < 60) return `hace ${mins} min`
      const hs = Math.floor(mins/60)
      if(hs < 24) return `hace ${hs} h`
      return `hace ${Math.floor(hs/24)} d`
    }

    function commentDisplayName(email){
      const name = String(email||"-").split("@")[0]
      return name.charAt(0).toUpperCase() + name.slice(1)
    }

    function getDriveFileIdFromUrl(url){
      const raw = String(url||"")
      const byId = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/)
      if(byId && byId[1]) return byId[1]
      const byPath = raw.match(/\/d\/([a-zA-Z0-9_-]+)/)
      return byPath && byPath[1] ? byPath[1] : ""
    }

    function buildInitialAvatar(email){
      const label = (String(email||"U").split("@")[0] || "U").slice(0,2).toUpperCase()
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='100%' height='100%' rx='40' fill='#334155'/><text x='50%' y='53%' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-size='28' fill='#ffffff'>${label}</text></svg>`
      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`
    }

    function buildAvatarUrl(user,email){
      const fileId = String(user?.photoFileId || getDriveFileIdFromUrl(user?.photoUrl || "")).trim()
      if(fileId) return `https://drive.google.com/uc?export=view&id=${encodeURIComponent(fileId)}`
      const direct = String(user?.photoUrl||"").trim()
      if(direct) return direct
      return buildInitialAvatar(email)
    }

    function userAvatarByEmail(email){
      const key = emailKey(email||"")
      const user = cachedUsersByEmail[key] || {}
      return buildAvatarUrl(user, email || "")
    }

    function handleAvatarError(img){
      if(!img) return
      img.onerror = null
      img.src = img.dataset.fallback || buildInitialAvatar("U")
    }

    function safeCommentHtml(html){
      return String(html || "")
        .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "")
        .replace(/\son\w+=(["']).*?\1/gi, "")
    }

    function commentPlainTextFromHtml(html){
      const div = document.createElement("div")
      div.innerHTML = String(html || "")
      return (div.textContent || "").trim()
    }

    function formatCommentEditor(ticketId, command, value=""){
      const editor = document.getElementById(`comment-editor-${ticketId}`)
      if(!editor) return
      editor.focus()
      document.execCommand(command, false, value)
    }

    function fmtMinutes(minutes){
      const m = Math.max(0, Number(minutes||0))
      const h = Math.floor(m/60)
      const rem = Math.round(m%60)
      return `${h}h ${rem}m`
    }

    function recomputeConsolidatedMinutes(timeTracking){
      const users = timeTracking?.users || {}
      return Object.values(users).reduce((acc,u)=> acc + Number(u?.totalMinutes||0), 0)
    }

    function parseCsvRows(text){
      const normalized = String(text || "").split(String.fromCharCode(13)).join("")
      return normalized.split("\n").map(r=>r.trim()).filter(Boolean).map(r=>r.split(',').map(c=>c.trim()))
    }

    async function parseSpreadsheetRows(file){
      const ext = String(file?.name||"").toLowerCase()
      if(ext.endsWith('.csv')){
        const txt = await file.text()
        return parseCsvRows(txt)
      }
      if(typeof XLSX === 'undefined') throw new Error('No se pudo cargar el parser de Excel (XLSX)')
      const buffer = await file.arrayBuffer()
      const wb = XLSX.read(buffer, { type: 'array' })
      const sheet = wb.Sheets[wb.SheetNames[0]]
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 })
      return rows.map(r => (r||[]).map(c => String(c??'').trim())).filter(r => r.some(Boolean))
    }

    function showImportFormatHelp(kind){

    async function uploadAttachmentFile(file){
      const b64 = await new Promise((resolve,reject)=>{
        const r = new FileReader()
        r.onload = () => resolve(String(r.result||"").split(",")[1] || "")
        r.onerror = reject
        r.readAsDataURL(file)
      })
      const res = await sheetWrite("uploadDriveFile", {
        folderId: DRIVE_FOLDER_ID,
        fileName: file.name,
        mimeType: file.type || "application/octet-stream",
        contentBase64: b64
      })
      if(!res || !res.ok || !res.url) throw new Error("No se pudo subir archivo")
      return { name: file.name, url: res.url, fileId: res.fileId||"" }
    }


    async function readFileAsDataUrl(file){
      return await new Promise((resolve,reject)=>{
        const r = new FileReader()
        r.onload = () => resolve(String(r.result||""))
        r.onerror = reject
        r.readAsDataURL(file)
      })
    }

    async function uploadUserPhotoFile(file){
      try{
        return await uploadAttachmentFile(file)
      }catch(err){
        const msg = String(err?.message || "")
        if(msg.includes("no soporta uploadDriveFile") || msg.includes("Acción no soportada")){
          const dataUrl = await readFileAsDataUrl(file)
          showToast("Apps Script sin uploadDriveFile: usando guardado local temporal de foto", "error", 4200)
          return { name: file.name, url: dataUrl, fileId: "", fallbackLocal: true }
        }
        throw err
      }
    }


    function showToast(message, type="info", keepMs=2200){
      const old = document.getElementById("globalToast")
      if(old) old.remove()
      const el = document.createElement("div")
      el.id = "globalToast"
      el.className = `toast ${type}`
      el.textContent = message
      document.body.appendChild(el)
      setTimeout(()=>{ if(el.parentNode) el.remove() }, keepMs)
    }

    function buildTicketCode(list){
      const max = (list||[]).reduce((acc, t) => {
        const m = String(t.id||"").match(/^TAO-(\d+)$/)
        if(!m) return acc
        return Math.max(acc, Number(m[1]))
      }, 0)
      const next = max + 1
      return `TAO-${String(next).padStart(2,"0")}`
    }

    async function sheetWrite(action, payload){
      if(!SHEET_WEBHOOK_URL){
        alert("Falta configurar SHEET_WEBHOOK_URL para guardar cambios en Google Sheets")
        throw new Error("SHEET_WEBHOOK_URL no configurada")
      }

      // Enviamos text/plain para evitar preflight CORS en hosting estático (GitHub Pages).
      const requestBody = JSON.stringify({ action, payload, sheetId: SHEET_ID, gid: SHEET_GID, ticketSheet: SHEET_TICKETS_NAME, adminSheet: SHEET_ADMINS_NAME })
      const res = await fetch(SHEET_WEBHOOK_URL, {
        method: "POST",
        mode: "cors",
        redirect: "follow",
        body: requestBody
      })

      if(!res.ok) throw new Error(`No se pudo escribir en Google Sheets (${res.status})`)
      const data = await res.json().catch(() => ({ ok: true }))
      if(data && data.ok === false){
        const rawError = String(data.error || "Error al guardar en Google Sheets")
        if(rawError.includes("setHeaders")) throw new Error("Tu Apps Script está desactualizado (usa response.setHeaders). Reemplazá el script por APPS_SCRIPT.gs y volvé a desplegar la Web App.")
        if(rawError.includes("Acción no soportada") && (action === "upsertUser" || action === "deleteUser")) return { ok: true, ignored: true }
        if(rawError.includes("Acción no soportada") && action === "uploadDriveFile") throw new Error("Tu Apps Script desplegado no soporta uploadDriveFile. Reemplazá APPS_SCRIPT.gs y volvé a desplegar la Web App.")
        throw new Error(rawError)
      }
      return data
    }

          <div class="card"><div class="boardWrap"><div id="boardContainer"></div></div></div>
        `}
      `

      applyTheme()
      if(isAdmin && adminPanelTab === 'config'){ loadUsersAdmin(); loadClientsAdmin() }
      if(currentRole === "consultor") startConsultorAutoRefresh(); else stopConsultorAutoRefresh()
      loadFilterOptions()
      if(!showAdminPanel || adminPanelTab === 'activity') loadDashboard()
      if(!showAdminPanel) loadTickets()
      if(isAdmin && adminPanelTab === 'config'){ }
    }

    function updateTicketSearch(value){ ticketSearchTerm = (value||"").trim().toLowerCase(); globalThis.ticketSearchTerm = ticketSearchTerm; loadTickets() }
    function updateClientFilter(value){ ticketFilterClient = (value||"").trim().toLowerCase(); globalThis.ticketFilterClient = ticketFilterClient; loadTickets() }
    function updateAnalystFilter(value){ ticketFilterAnalyst = (value||"").trim().toLowerCase(); loadTickets() }

    function openTicketModal(){ document.getElementById("ticketModal").classList.remove("hidden") }
    function closeTicketModal(){
      document.getElementById("tTitle").value = ""
      document.getElementById("tDescription").value = ""
      document.getElementById("tPriority").value = "Media"
      document.getElementById("tClient").value = ""
      document.getElementById("tDeadline").value = ""
      document.getElementById("ticketModal").classList.add("hidden")
    }

    async function saveTicket(){
      const title = document.getElementById("tTitle").value.trim()
      const description = document.getElementById("tDescription").value.trim()
      const priority = document.getElementById("tPriority").value
      const client = document.getElementById("tClient").value.trim()
      const deadline = document.getElementById("tDeadline").value
      const informer = (document.getElementById("tInformer")?.value || currentUser.email).trim().toLowerCase()

      if(!title || !description || !client) return alert("Completá título, detalle y cliente/área")
      if(!informer) return alert("Seleccioná informador")

      showToast("Creando ticket...", "info", 1600)
      const now = new Date().toISOString()
      const code = buildTicketCode(cachedTickets)
      const ticket = {
        id: code,
        title, description, priority, client, deadline,
        status: "unassigned",
        assignedTo: "",
        comments: {},
        createdAt: now,
        createdBy: currentUser.email,
        updatedAt: now,
        updatedBy: currentUser.email,
        informer,
        requestedDeadline: "",
        deadlineChangeStatus: "none",
        deadlineChangeRequestedBy: "",
        deadlineChangeRequestedAt: "",
        deadlineChangeReviewedBy: "",
        helpers: [],
        timeTracking: { users: {}, consolidatedMinutes: 0 }
      }

      const dbKey = emailKey(code)
      await db.ref("tickets").child(dbKey).set(ticket)
      const savedTicket = { ...ticket, dbKey }
      mirrorToSheet("createTicket", savedTicket)
      logActivity("ticket_creado", { title, client, code })
      closeTicketModal()
      loadDashboard()
      showToast(`Ticket ${code} creado correctamente`, "ok")
    }

    async function loadTickets(){
      const container = document.getElementById("boardContainer")
      if(!container) return

      db.ref("tickets").off()
      db.ref("tickets").on("value", snap => {
        const data = Object.entries(snap.val() || {}).map(([dbKey,t]) => ({ ...t, id: t?.id || dbKey, dbKey, comments: parseCommentsValue(t?.comments) }))
        cachedTickets = data
        renderTicketsFromData(data)
      })
    }

    function renderTicketsFromData(data){
      const container = document.getElementById("boardContainer")
      if(!container) return
      const grouped = { unassigned: [], todo: [], doing: [], recurrent: [], done: [] }

      Object.entries(data).forEach(([_, t]) => {
        const canSeeTicket = currentRole === "admin" || currentRole === "analista" || (currentRole === "consultor" && ((t.informer||t.createdBy||"").toLowerCase() === (currentUser.email||"").toLowerCase()))
        if(!canSeeTicket) return

        const haystack = `${t.title||""} ${t.description||""} ${t.client||""} ${t.createdBy||""}`.toLowerCase()
        if(ticketSearchTerm && !haystack.includes(ticketSearchTerm)) return
        if(ticketFilterClient && !(String(t.client||"").toLowerCase().includes(ticketFilterClient))) return
        if(ticketFilterAnalyst && !(String(t.assignedTo||"").toLowerCase().includes(ticketFilterAnalyst))) return

        const status = grouped[t.status] ? t.status : "unassigned"
        grouped[status].push(t)
      })

      const maxTicketsInColumn = Math.max(...Object.values(grouped).map(arr => arr.length), 0)
      const uniformHeight = Math.max(220, 120 + maxTicketsInColumn * 190)

      container.innerHTML = `<div class="board">${Object.entries(STATUS).map(([status, label]) => `
        <div class="column" style="min-height:${uniformHeight}px" ondragover="onColumnDragOver(event)" ondragleave="onColumnDragLeave(event)" ondrop="onColumnDrop(event,'${status}')">
          <h4>${label} <span class="small">(${grouped[status].length})</span></h4>
          ${grouped[status].map(t => renderTicketCard(t, status)).join("") || `<p class="small">Sin tickets</p>`}
        </div>
      `).join("")}</div>`
    }

    function renderTicketCard(ticket, status){
      const assignedTo = String(ticket.assignedTo||"").toLowerCase()
      const assignedAvatar = assignedTo ? userAvatarByEmail(assignedTo) : ""
      const canDrag = currentRole === "admin" || currentRole === "analista"
      return `
        <div class="ticket ${priorityClass(ticket.priority)}" ${canDrag ? `draggable="true" ondragstart="onTicketDragStart(event,'${ticket.id}')" ondragend="onTicketDragEnd(event)"` : ""}>
          <h5><span class="ticketCode">${htmlEscape(ticket.id||"-")}</span>${htmlEscape(ticket.title||"-")}</h5>
          <div class="meta">${htmlEscape(ticket.client||"-")}</div>
          <div class="meta">Informador: ${htmlEscape(ticket.informer||ticket.createdBy||"-")}</div>
          <div class="assignedAvatarRow">${assignedAvatar ? `<img class="assignedAvatar" src="${htmlEscape(assignedAvatar)}" alt="avatar" data-fallback="${htmlEscape(buildInitialAvatar(assignedTo||'A'))}" onerror="handleAvatarError(this)">` : ""}<div class="meta">${htmlEscape(ticket.assignedTo||"Sin asignar")}</div></div>
          <div class="meta deadline">Deadline: ${ticket.deadline ? formatDateDMY(ticket.deadline) : "Sin fecha"}</div>
          ${ticket.urgentRequested?`<div class="urgentFlag">Marcado como urgente</div>`:""}
          <div class="inline" style="margin-top:8px"><button class="ghost" onclick="openTicketDetailModal('${ticket.id}')">Ver detalle</button>${currentRole === "admin" ? `<button class="danger" onclick="deleteTicket('${ticket.id}')">Eliminar</button>` : ""}</div>
        </div>
      `
    }

    async function openTicketDetailModal(id){
      const ticket = cachedTickets.find(t => t.id === id)
      if(!ticket) return alert("No se encontró el ticket")
      const canEdit = currentRole === "admin"
      const canManageStatus = currentRole === "admin" || currentRole === "analista"
      const usersByEmail = (await db.ref("users_by_email").once("value")).val() || {}
      cachedUsersByEmail = usersByEmail
      let analysts = []
      if(canManageStatus){
        analysts = Object.values(usersByEmail).filter(u => u && u.role === "analista" && u.active !== false).map(u => (u.email||"").toLowerCase())
      }
      const consultors = Object.values(usersByEmail).filter(u => u && u.role === "consultor" && u.active !== false).map(u => (u.email||"").toLowerCase()).sort()
      const analystOptions = analysts.map(a => `<option value="${htmlEscape(a)}" ${String(ticket.assignedTo||"").toLowerCase()===a?'selected':''}>${htmlEscape(a)}</option>`).join("")
      const currentInformer = String(ticket.informer || ticket.createdBy || "").toLowerCase()
      const informerOptions = `<option value="">Seleccionar informador</option>${consultors.map(c => `<option value="${htmlEscape(c)}" ${currentInformer===c?"selected":""}>${htmlEscape(c)}</option>`).join("")}`
      const statusOptions = Object.entries(STATUS).map(([key,label]) => `<option value="${key}" ${ticket.status===key?"selected":""}>${label}</option>`).join("")

      const titleEl = document.getElementById("ticketDetailTitle")
      if(titleEl) titleEl.textContent = `Detalle del ticket · ${ticket.id||"-"}`
      const headerControls = document.getElementById("ticketDetailHeaderControls")
      if(headerControls){
        headerControls.innerHTML = canManageStatus
          ? `<div class="inline" style="gap:8px;align-items:center"><select id="detail-status-${ticket.id}" onchange="autoSaveTicketDetail('${ticket.id}')" style="margin:0;min-width:170px">${statusOptions}</select></div>`
          : `<span class="small">Estado: <strong>${htmlEscape(STATUS[ticket.status] || "-")}</strong></span>`
      }

      document.getElementById("ticketDetailContent").innerHTML = `
        ${(currentRole === "admin" || currentRole === "analista") && ticket.urgentRequested ? `<div class="inline" style="margin-bottom:8px"><span class="urgentTopFlag">🚨 URGENTE</span></div>` : ''}
        <div class="detailLayout">
          <div>
            <div class="row">
              <div><label>Título</label><input id="detail-title-${ticket.id}" ${canEdit?`onchange="autoSaveTicketDetail('${ticket.id}')"`:""} value="${htmlEscape(ticket.title||"")}" ${canEdit?"":"disabled"}></div>
              <div><label>Prioridad</label><select id="detail-priority-${ticket.id}" ${canEdit?`onchange="autoSaveTicketDetail('${ticket.id}')"`:""} ${canEdit?"":"disabled"}><option value="Alta" ${ticket.priority==='Alta'?'selected':''}>Alta</option><option value="Media" ${ticket.priority==='Media'?'selected':''}>Media</option><option value="Baja" ${ticket.priority==='Baja'?'selected':''}>Baja</option></select></div>
              <div><label>Deadline</label><input id="detail-deadline-${ticket.id}" ${canEdit?`onchange="autoSaveTicketDetail('${ticket.id}')"`:""} type="date" value="${htmlEscape(ticket.deadline||"")}" ${canEdit?"":"disabled"}></div>
            </div>
            <div><label>Detalle</label><textarea id="detail-description-${ticket.id}" ${canEdit?`onchange="autoSaveTicketDetail('${ticket.id}')"`:""} ${canEdit?"":"disabled"}>${htmlEscape(ticket.description||"")}</textarea></div>
            <div><label>Cliente/Área</label><input id="detail-client-${ticket.id}" ${canEdit?`onchange="autoSaveTicketDetail('${ticket.id}')"`:""} value="${htmlEscape(ticket.client||"")}" ${canEdit?"":"disabled"}></div>
            <div><label>Informador</label><select id="detail-informer-${ticket.id}" ${canEdit?`onchange="autoSaveTicketDetail('${ticket.id}')"`:""} ${canEdit?"":"disabled"}>${informerOptions}</select></div>

            ${currentRole === "consultor" ? `<div class="inline" style="margin-top:6px"><button class="urgentBtn" onclick="toggleUrgent('${ticket.id}')">${ticket.urgentRequested ? "Quitar urgente" : "🚨 Marcar urgente"}</button></div>${ticket.deadlineChangeStatus === "pending" ? `<div class="small">Solicitud de cambio de deadline: ${htmlEscape(ticket.requestedDeadline||"-")}<div class="inline" style="margin-top:6px"><button class="ghost" onclick="applyDeadlineDecision('${ticket.id}', true)">Aprobar deadline</button><button class="danger" onclick="applyDeadlineDecision('${ticket.id}', false)">Rechazar</button></div></div>` : ""}` : "" }

            ${renderComments(id, ticket.comments || {}, usersByEmail)}
          </div>
        </div>
      `
      document.getElementById("ticketDetailModal").classList.remove("hidden")
      setupLiveTimer(id)
      setTicketActivityTab(id, ticketActivityTabById[id] || "comments")
    }



    async function loadTicketHistory(ticketId){
      const el = document.getElementById(`ticket-history-tab-${ticketId}`)
      if(!el) return
      const logs = Object.values((await db.ref("activity_logs").once("value")).val() || {})
        .filter(l => l.ticketId === ticketId)
        .sort((a,b)=>new Date(a.timestampIso||0)-new Date(b.timestampIso||0))
      if(!logs.length){ el.innerHTML = "Sin historial."; return }
      el.innerHTML = logs.map(l => `<div class="feedItem"><div class="feedType">${htmlEscape(l.eventType||"evento")}</div><div class="feedMeta">${htmlEscape(l.email||"-")} · ${l.timestampIso?new Date(l.timestampIso).toLocaleString():""}</div></div>`).join("")
    }

    function closeTicketDetailModal(){
      const openId = (document.getElementById("ticketDetailTitle")?.textContent || "").split("·")[1]?.trim() || ""
      if(openId) clearLiveTimer(openId)
      document.getElementById("ticketDetailModal").classList.add("hidden")
      document.getElementById("ticketDetailContent").innerHTML = ""
      const headerControls = document.getElementById("ticketDetailHeaderControls")
      if(headerControls) headerControls.innerHTML = ""
      const titleEl = document.getElementById("ticketDetailTitle")
      if(titleEl) titleEl.textContent = "Detalle del ticket"
    }


    async function assignTicketToMe(id){
      const owner = document.getElementById(`detail-owner-${id}`)
      if(owner){ owner.value = (currentUser.email||"").toLowerCase(); autoSaveTicketDetail(id) }
    }

    async function autoSaveTicketDetail(id){
      if(currentRole !== "consultor") return
      const ticket = cachedTickets.find(t => t.id === id)
      if(!ticket) return
      const canEditFields = currentRole === "admin"
      const updated = {
        ...ticket,
        title: canEditFields ? ((document.getElementById(`detail-title-${id}`)?.value || "").trim() || ticket.title) : ticket.title,
        description: canEditFields ? ((document.getElementById(`detail-description-${id}`)?.value || "").trim() || ticket.description) : ticket.description,
        priority: canEditFields ? (document.getElementById(`detail-priority-${id}`)?.value || ticket.priority) : ticket.priority,
        client: canEditFields ? ((document.getElementById(`detail-client-${id}`)?.value || "").trim() || ticket.client) : ticket.client,
        informer: canEditFields ? ((document.getElementById(`detail-informer-${id}`)?.value || ticket.informer || ticket.createdBy).trim().toLowerCase()) : (ticket.informer || ticket.createdBy),
        assignedTo: (document.getElementById(`detail-owner-${id}`)?.value || ticket.assignedTo || "").trim().toLowerCase(),
        deadline: canEditFields ? ((document.getElementById(`detail-deadline-${id}`)?.value || "").trim()) : ticket.deadline,
        status: (document.getElementById(`detail-status-${id}`)?.value || ticket.status),
        updatedAt: new Date().toISOString(),
        updatedBy: currentUser.email
      }
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id, ...updated })
      const ix = cachedTickets.findIndex(t => t.id === id)
      if(ix >= 0) cachedTickets[ix] = updated
      renderTicketsFromData(cachedTickets)
      await loadDashboard()
      showToast("Ticket actualizado", "ok")
    }

    function renderTicketActions(id, currentStatus){
      const options = Object.entries(STATUS)
        .filter(([key]) => key !== currentStatus)
        .map(([key, label]) => `<option value="${key}">${label}</option>`)
        .join("")

      const canDelete = currentRole === "admin"
      const canMove = currentRole === "admin" || currentRole === "analista" || currentRole === "consultor"
      const canAssign = currentRole === "admin" || currentRole === "analista"

      const assignSelect = canAssign ? `
        <div class="inline" style="margin-top:8px;width:100%">
          <input id="assign-${id}" placeholder="Email analista" style="margin:0;min-width:170px" />
          <button class="ghost" onclick="assignTicket('${id}')">Asignar</button>
        </div>
      ` : ""

      const moveBlock = canMove ? `
        <select id="next-${id}" style="margin:0;min-width:160px">
          ${options}
        </select>
        <button class="ghost" onclick="moveTicket('${id}')">Mover</button>
      ` : `<span class="small">No tenés permisos para mover estados</span>`

      return `

          ${moveBlock}
          ${canDelete?`<button class="danger" onclick="deleteTicket('${id}')">Borrar</button>`:""}
        </div>
        ${assignSelect}
      `
    }

    function toggleCommentsSort(ticketId){
      const current = commentSortOrderByTicket[ticketId] || "asc"
      commentSortOrderByTicket[ticketId] = current === "asc" ? "desc" : "asc"
      openTicketDetailModal(ticketId)
    }

    function setTicketActivityTab(ticketId, tab){
      ticketActivityTabById[ticketId] = tab
      const commentsEl = document.getElementById(`ticket-comments-tab-${ticketId}`)
      const historyEl = document.getElementById(`ticket-history-tab-${ticketId}`)
      const timesEl = document.getElementById(`ticket-times-tab-${ticketId}`)
      const commentsBtn = document.getElementById(`activity-btn-comments-${ticketId}`)
      const historyBtn = document.getElementById(`activity-btn-history-${ticketId}`)
      const timesBtn = document.getElementById(`activity-btn-times-${ticketId}`)
      if(commentsEl) commentsEl.classList.toggle("hidden", tab !== "comments")
      if(historyEl) historyEl.classList.toggle("hidden", tab !== "history")
      if(timesEl) timesEl.classList.toggle("hidden", tab !== "times")
      if(commentsBtn) commentsBtn.classList.toggle("active", tab === "comments")
      if(historyBtn) historyBtn.classList.toggle("active", tab === "history")
      if(timesBtn) timesBtn.classList.toggle("active", tab === "times")
      if(tab === "history") loadTicketHistory(ticketId)
      if(tab === "times") setupLiveTimer(ticketId)
      else clearLiveTimer(ticketId)
    }

    function renderTimesTab(ticketId, usersByEmail){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return '<div class="small">Sin datos de tiempo</div>'
      const tracking = ticket.timeTracking || { users:{}, consolidatedMinutes:0 }
      const helpers = Array.from(new Set([...(ticket.helpers||[]), ...(ticket.assignedTo ? [ticket.assignedTo] : [])])).filter(Boolean)
      const analysts = Object.values(usersByEmail||{}).filter(u => u && u.role === 'analista' && u.active !== false).map(u => (u.email||'').toLowerCase()).sort()
      const options = `<option value="">Seleccionar analista</option>${analysts.map(a => `<option value="${htmlEscape(a)}">${htmlEscape(a)}</option>`).join('')}`

      const rows = {}
      Object.entries(tracking.users || {}).forEach(([k,v]) => rows[k] = { ...(v||{}) })
      helpers.forEach(email => {
        const k = emailKey(email)
        if(!rows[k]) rows[k] = { email, totalMinutes:0, timerStartAt:'' }
      })

      const userRows = Object.entries(rows)
      const canManageHelpers = currentRole === 'admin' || currentRole === 'analista'
      const helpersHtml = userRows.length ? userRows.map(([uk, u]) => {
        const email = String(u?.email || '')
        const mine = emailKey(email) === emailKey(currentUser.email)
        const running = !!u?.timerStartAt
        const removable = canManageHelpers && emailKey(email) !== emailKey(ticket.assignedTo || '')
        return `<div class="feedItem"><div class="inline" style="justify-content:space-between;align-items:center;gap:8px"><div><strong>${htmlEscape(email||'-')}</strong><div class="small">Total: ${fmtMinutes(u?.totalMinutes||0)}</div></div><div class="inline" style="gap:6px;align-items:center">${mine ? `<input id="manual-hours-${ticketId}-${uk}" type="number" min="0" placeholder="hs" style="margin:0;max-width:70px"><input id="manual-mins-${ticketId}-${uk}" type="number" min="0" placeholder="min" style="margin:0;max-width:70px"><button class="ghost" onclick="logManualTimeForUser('${ticketId}','${uk}')">Cargar</button><button id="timer-toggle-${ticketId}-${uk}" class="ghost" onclick="toggleTicketTimerForUser('${ticketId}','${uk}')">${running ? '🕒 Parar timer' : '🕒 Iniciar timer'}</button>` : ''}<span id="timer-live-${ticketId}-${uk}" class="timerLive">🕒 ${running ? '00:00:00' : '00:00:00'}</span>${removable ? `<button class="danger" onclick="removeHelperFromTicket('${ticketId}','${uk}')">Quitar</button>` : ''}</div></div></div>`
      }).join('') : '<div class="small">Todavía no hay tiempos cargados.</div>'

      return `<div>
        ${(currentRole === 'admin' || currentRole === 'analista') ? `<div class="inline" style="margin-bottom:8px;align-items:center;gap:8px"><label style="margin:0" class="small">OWNER DE LA TAREA</label><select id="detail-owner-${ticketId}" onchange="autoSaveTicketDetail('${ticketId}')" style="margin:0;min-width:240px"><option value="">Sin asignar</option>${analysts.map(a => `<option value="${htmlEscape(a)}" ${String(ticket.assignedTo||'').toLowerCase()===a?'selected':''}>${htmlEscape(a)}</option>`).join('')}</select><button class="ghost" style="margin:0" onclick="assignTicketToMe('${ticketId}')">Asignar</button></div>` : ''}
        <div class="inline" style="margin-bottom:8px;gap:8px;align-items:center"><select id="helper-analyst-${ticketId}" style="margin:0;max-width:260px">${options}</select><button class="ghost" onclick="assignHelperFromDropdown('${ticketId}')">Asignar</button><button class="ghost" onclick="joinAsHelper('${ticketId}')">Sumarme como ayudante</button><button class="ghost" onclick="joinAsAnalyst('${ticketId}')">Sumarme como analista</button></div>
        <div class="small" style="margin-bottom:8px">Ayudantes: ${htmlEscape(helpers.join(', ') || 'Ninguno')}</div>
        ${helpersHtml}
      </div>`
    }


    function renderComments(id, comments, usersByEmail){
      const sortOrder = commentSortOrderByTicket[id] || "asc"
      const list = Object.entries(comments || {}).map(([cid,c]) => ({ id: cid, ...(c||{}) })).filter(c => currentRole !== "consultor" || !c.internal).sort((a,b)=> sortOrder === "asc" ? new Date(a.createdAt||0)-new Date(b.createdAt||0) : new Date(b.createdAt||0)-new Date(a.createdAt||0))
      return `
        <div class="commentsSection">
          <div class="commentsHeader">
            <div><div class="commentsTitle">Información interna del ticket</div><div class="small">Consolidado: <strong>${fmtMinutes((cachedTickets.find(t => t.id === id)?.timeTracking?.consolidatedMinutes)||0)}</strong></div></div>

            <button id="activity-btn-comments-${id}" class="activityTab ${(ticketActivityTabById[id] || "comments") === "comments" ? "active" : ""}" onclick="setTicketActivityTab('${id}','comments')">Comentarios</button>
            <button id="activity-btn-history-${id}" class="activityTab ${(ticketActivityTabById[id] || "comments") === "history" ? "active" : ""}" onclick="setTicketActivityTab('${id}','history')">Historial</button>
            <button id="activity-btn-times-${id}" class="activityTab ${(ticketActivityTabById[id] || "comments") === "times" ? "active" : ""}" onclick="setTicketActivityTab('${id}','times')">Tiempos</button>
          </div>

          <div id="ticket-comments-tab-${id}" class="${(ticketActivityTabById[id] || "comments") === "comments" ? "" : "hidden"}">
            ${list.length ? list.map(c=>`<div class="commentItem ${c.internal ? "internal" : ""} ${currentRole === "consultor" && c.maximumAttention ? "maximumAttention" : ""}"><div class="commentHead"><div class="commentHeadLeft"><img class="commentAvatar" src="${htmlEscape(userAvatarByEmail(c.author||""))}" alt="avatar" data-fallback="${htmlEscape(buildInitialAvatar(c.author||'U'))}" onerror="handleAvatarError(this)"><div><strong>${htmlEscape(commentDisplayName(c.author||"-"))}</strong>${c.internal ? `<span class="internalBadge">Interno</span>` : ""}${c.maximumAttention ? `<span class="attentionBadge">Atención máxima</span>` : ""}<span class="small" style="margin-left:8px">${formatAgo(c.createdAt)}</span></div></div></div>${c.messageHtml ? `<div class="commentBody formatted">${safeCommentHtml(c.messageHtml)}</div>` : `<div class="commentBody">${htmlEscape(c.message||"")}</div>`}${c.attachment?.url ? `<div class="small" style="margin-top:6px"><a href="${htmlEscape(c.attachment.url)}" target="_blank">📎 ${htmlEscape(c.attachment.name||"Archivo")}</a></div>`:""}<div class="commentFooter"><div class="commentActions"><button class="ghost" style="padding:4px 8px" onclick="reactToComment('${id}','${c.id||""}','👍')">👍 ${Object.keys((c.reactions||{}).thumbsUp||{}).length}</button><button class="ghost" style="padding:4px 8px" onclick="reactToComment('${id}','${c.id||""}','❤️')">❤️ ${Object.keys((c.reactions||{}).heart||{}).length}</button><button class="ghost" style="padding:4px 8px" onclick="reactToComment('${id}','${c.id||""}','👀')">👀 ${Object.keys((c.reactions||{}).eyes||{}).length}</button></div><button class="commentDeleteText" onclick="deleteComment('${id}','${c.id||""}')">Eliminar</button></div></div>`).join("") : `<div class="small">Sin comentarios</div>`}

    function handleCommentKeydown(ev, id){
      if(ev.key !== "Enter" || ev.shiftKey) return
      const node = ev.target || document.activeElement
      const inList = !!(node && node.closest && node.closest('li'))
      if(inList) return
      ev.preventDefault()
      addComment(id)
    }

    function onTicketDragEnd(event){
      if(event?.currentTarget) event.currentTarget.classList.remove("dragging")

    function onColumnDragOver(event){

    async function onColumnDrop(event, status){
      event.preventDefault()
      event.currentTarget.classList.remove('dropTarget')
      const ticketId = draggedTicketId || event?.dataTransfer?.getData("text/plain") || ""
      if(!ticketId) return
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket || ticket.status === status) return
      if(!(currentRole === "admin" || currentRole === "analista")) return
      const updated = { ...ticket, status, updatedAt: new Date().toISOString(), updatedBy: currentUser.email }
      showToast("Moviendo ticket...", "info", 1400)
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id: ticketId, ...updated })
      await logActivity("ticket_movido", { ticketId, nextStatus: status, fromStatus: ticket.status, source: "drag_drop" })
      const ix = cachedTickets.findIndex(t => t.id === ticketId)
      if(ix >= 0) cachedTickets[ix] = updated
      renderTicketsFromData(cachedTickets)
      await loadDashboard()
      showToast("Ticket movido correctamente", "ok")
    }

    function refreshLiveTimerText(ticketId){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return
      const users = ticket.timeTracking?.users || {}
      Object.entries(users).forEach(([uk, userTrack]) => {
        const liveEl = document.getElementById(`timer-live-${ticketId}-${uk}`)
        const btn = document.getElementById(`timer-toggle-${ticketId}-${uk}`)
        if(!liveEl) return
        const running = !!userTrack?.timerStartAt
        if(btn) btn.textContent = running ? '🕒 Parar timer' : '🕒 Iniciar timer'
        if(running){
          const elapsed = Math.max(0, Math.floor((Date.now() - new Date(userTrack.timerStartAt).getTime())/1000))
          const hh = String(Math.floor(elapsed/3600)).padStart(2,'0')
          const mm = String(Math.floor((elapsed%3600)/60)).padStart(2,'0')
          const ss = String(elapsed%60).padStart(2,'0')
          liveEl.textContent = `🕒 ${hh}:${mm}:${ss}`
        }else liveEl.textContent = '🕒 00:00:00'
      })
    }

    async function toggleTicketTimerForUser(ticketId, userKey){
      const ticket = cachedTickets.find(t => t.id === ticketId); if(!ticket) return
      const users = ticket.timeTracking?.users || {}
      const u = users[userKey] || {}
      if(u.timerStartAt) return stopTicketTimerForUser(ticketId, userKey)
      return startTicketTimerForUser(ticketId, userKey)
    }

    async function startTicketTimerForUser(ticketId, userKey){
      await applyTimeUpdate(ticketId, (tracking)=>{
        const u = tracking.users[userKey] || { email: currentUser.email, totalMinutes:0, timerStartAt:'' }
        if(!u.timerStartAt) u.timerStartAt = new Date().toISOString()
        tracking.users[userKey] = u
      })
      showToast('Timer iniciado','ok')
    }

    async function stopTicketTimerForUser(ticketId, userKey){
      const ticket = cachedTickets.find(t => t.id === ticketId); if(!ticket) return
      const u = (ticket.timeTracking?.users||{})[userKey] || {}
      if(!u.timerStartAt) return alert('El timer no está iniciado')
      const elapsed = Math.max(1, Math.round((Date.now() - new Date(u.timerStartAt).getTime())/60000))
      const acceptClock = confirm(`Tiempo medido: ${elapsed} min. ¿Cargar este tiempo del reloj?`)
      let minutes = elapsed
      if(!acceptClock){
        const manual = Number(prompt('Ingresá minutos manuales:', String(elapsed)) || 0)
        if(manual <= 0) return
        minutes = manual
      }
      await applyTimeUpdate(ticketId, (tracking)=>{
        const curr = tracking.users[userKey] || { email: currentUser.email, totalMinutes:0, timerStartAt:'' }
        curr.totalMinutes = Number(curr.totalMinutes||0) + minutes
        curr.timerStartAt = ''
        tracking.users[userKey] = curr
      })
      showToast('Tiempo cargado','ok')
    }

    async function logManualTimeForUser(ticketId, userKey){
      const hs = Number(document.getElementById(`manual-hours-${ticketId}-${userKey}`)?.value || 0)
      const mins = Number(document.getElementById(`manual-mins-${ticketId}-${userKey}`)?.value || 0)
      const minutes = hs * 60 + mins
      if(minutes <= 0) return alert('Ingresá horas o minutos válidos')
      await applyTimeUpdate(ticketId, (tracking)=>{
        const u = tracking.users[userKey] || { email: currentUser.email, totalMinutes:0, timerStartAt:'' }
        u.totalMinutes = Number(u.totalMinutes||0) + minutes
        tracking.users[userKey] = u
      })
      showToast('Tiempo manual cargado','ok')
    }

      try{

        const comments = { ...(ticket.comments || {}) }

        if(file){
          showToast("Subiendo archivo...", "info", 2000)
          try{ attachment = await uploadAttachmentFile(file) }catch(err){ console.error("Fallo upload adjunto:", err); showToast(err?.message || "No se pudo subir adjunto, se enviará comentario sin archivo", "error", 3500) }
        }
        comments[generateId()] = { message, messageHtml, author: currentUser.email, createdAt: new Date().toISOString(), attachment, internal, maximumAttention }

        mirrorToSheet("updateTicket", { id, ...updated })

        if(ix >= 0) cachedTickets[ix] = updated
        renderTicketsFromData(cachedTickets)
        if(editor) editor.innerHTML = ""
        const fileInput = document.getElementById(`comment-file-${id}`)
        if(fileInput) fileInput.value = ""
        const internalInput = document.getElementById(`comment-internal-${id}`)
        if(internalInput) internalInput.checked = false

    }

    async function loadUsersAdmin(){

      if(!container) return

      const users = Object.values(usersMap).length ? Object.values(usersMap) : await fetchUsersFromSheet()
      if(!users.length){ container.innerHTML = "Sin usuarios cargados"; return }
      container.innerHTML = users.map(u => {
        const key = emailKey(u.email)
        const isSelf = (u.email||"").toLowerCase() === (currentUser.email||"").toLowerCase()
        return `<div class="card" style="padding:10px;margin:6px 0"><div class="inline" style="justify-content:space-between"><div class="inline" style="gap:10px"><img class="commentAvatar" src="${htmlEscape(buildAvatarUrl(u, u.email||''))}" data-fallback="${htmlEscape(buildInitialAvatar(u.email||'U'))}" onerror="handleAvatarError(this)" alt="avatar"><div><strong>${htmlEscape(u.email||"-")}</strong><br><span class="small">Rol: ${htmlEscape(u.role||"-")} · Clave: Oculta</span></div></div><div class="inline"><input id="user-photo-${key}" type="file" accept="image/*" style="max-width:200px;margin:0"><button class="ghost" onclick="updateUserPhoto('${key}','${u.email||''}','${u.role||'consultor'}', this)">Actualizar foto</button><button class="danger" ${isSelf?"disabled":""} onclick="deleteUserAccess('${key}','${u.email||''}')">Eliminar</button></div></div></div>`
      }).join("")
    }

    async function updateUserPhoto(key,email,role,btn){
      if(currentRole !== "admin") return
      const file = document.getElementById(`user-photo-${key}`)?.files?.[0]
      if(!file) return alert("Seleccioná una foto")
      const button = btn || null
      const oldText = button ? button.textContent : ""
      try{
        if(button){ button.disabled = true; button.textContent = "Cambiando..." }
        showToast("Guardando foto...", "info", 1800)
        const uploaded = await uploadUserPhotoFile(file)
        const usersMap = (await db.ref("users_by_email").once("value")).val() || {}
      const users = Object.values(usersMap).length ? Object.values(usersMap) : await fetchUsersFromSheet()
        const existing = users.find(u => emailKey(u.email) === key) || {}
        const payload = {
          key,
          email,
          password: existing.password || "",
          role,
          active: existing.active !== false,
          createdAt: existing.createdAt || new Date().toISOString(),
          createdBy: existing.createdBy || currentUser.email,
          lastAccessAt: existing.lastAccessAt || "",
          photoUrl: uploaded.url || "",
          photoFileId: uploaded.fileId || ""
        }
        await adminWrite("upsertUser", payload)
        await db.ref("users_by_email").child(key).update(payload)
        if(uploaded.fallbackLocal) showToast("Foto actualizada (modo local). Para Drive, redeploy Apps Script.", "error", 4200)
        else showToast("Foto actualizada", "ok")
        await loadUsersAdmin()
        await loadFilterOptions()
      }catch(err){
        console.error("Error actualizando foto:", err)
        showToast(err?.message || "No se pudo actualizar la foto", "error", 3000)
      }finally{
        if(button){ button.disabled = false; button.textContent = oldText || "Actualizar foto" }
      }
    }

    async function deleteUserAccess(key,email){
      if(currentRole !== "admin") return alert("Solo admin puede eliminar usuarios")
      if(!confirm(`¿Eliminar acceso para ${email}?`)) return
      await db.ref("users_by_email").child(key).remove()
      await adminWrite("deleteUser", { key })
      await loadUsersAdmin()
      await loadFilterOptions()
    }

    function setAnalystActivityTab(tab){
      analystActivityTab = tab === "alerts" ? "alerts" : "comments"
      const comments = document.getElementById("recentActivity")
      const alerts = document.getElementById("recentActivityAlerts")
      const btnComments = document.getElementById("analyst-tab-comments")
      const btnAlerts = document.getElementById("analyst-tab-alerts")
      if(comments) comments.classList.toggle("hidden", analystActivityTab !== "comments")
      if(alerts) alerts.classList.toggle("hidden", analystActivityTab !== "alerts")
      if(btnComments) btnComments.classList.toggle("ghost", analystActivityTab !== "comments")
      if(btnAlerts) btnAlerts.classList.toggle("ghost", analystActivityTab !== "alerts")
    }

    function toLocalDateOnly(date){
      const y = date.getFullYear()
      const m = String(date.getMonth()+1).padStart(2,'0')
      const d = String(date.getDate()).padStart(2,'0')
      return `${y}-${m}-${d}`
    }

    function businessDaysBetweenArg(today, target){
      const start = new Date(today.getFullYear(), today.getMonth(), today.getDate())
      const end = new Date(target.getFullYear(), target.getMonth(), target.getDate())
      if(Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return null
      if(end < start) return 0
      let count = 0
      const day = new Date(start)
      while(day <= end){
        const dow = day.getDay()
        if(dow !== 0 && dow !== 6) count++
        day.setDate(day.getDate()+1)
      }
      return Math.max(0, count-1)
    }

    async function requestDeadlineChangeFromDashboard(ticketId, triggerEl){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return alert("No se encontró el ticket")
      if(currentRole !== "analista") return alert("Solo analista puede solicitar cambio de deadline desde actividad")
      const currentValue = ticket.deadline || toLocalDateOnly(new Date())
      const requestedDeadline = await pickDateFromCalendar(currentValue, triggerEl)
      if(!requestedDeadline) return
      const comments = { ...(ticket.comments || {}) }
      const autoMessage = `Solicitud automática: ${currentUser.email} solicita cambio de deadline a ${requestedDeadline} para revisión del consultor.`
      const duplicated = Object.values(comments).some(c => String(c?.message||'').trim() === autoMessage && String(c?.author||'').toLowerCase() === String(currentUser.email||'').toLowerCase())
      if(!duplicated) comments[generateId()] = { message: autoMessage, author: currentUser.email, createdAt: new Date().toISOString(), internal: false, maximumAttention: true }
      const updated = {
        ...ticket,
        requestedDeadline,
        deadlineChangeStatus: "pending",
        deadlineChangeRequestedBy: currentUser.email,
        deadlineChangeRequestedAt: new Date().toISOString(),
        deadlineChangeReviewedBy: "",
        comments,
        updatedAt: new Date().toISOString(),
        updatedBy: currentUser.email
      }
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id: ticketId, ...updated })
      const ix = cachedTickets.findIndex(t => t.id === ticketId)
      if(ix >= 0) cachedTickets[ix] = updated
      await logActivity("deadline_change_requested", { ticketId, requestedDeadline, source: "analyst_dashboard" })
      await logActivity("ticket_comentario", { ticketId, source: "deadline_request_auto_comment" })
      await loadDashboard()
      showToast("Solicitud enviada al consultor", "ok")
    }

    function formatDateDMY(value){
      if(!value) return "-"
      const d = new Date(`${value}T00:00:00`)
      if(Number.isNaN(d.getTime())) return htmlEscape(String(value))
      const dd = String(d.getDate()).padStart(2,'0')
      const mm = String(d.getMonth()+1).padStart(2,'0')
      const yy = d.getFullYear()
      return `${dd}/${mm}/${yy}`
    }

    async function pickDateFromCalendar(defaultValue, anchorEl){
      return await new Promise((resolve)=>{
        const input = document.createElement('input')
        input.type = 'date'
        input.value = defaultValue || ''
        input.style.position = 'fixed'
        input.style.opacity = '1'
        input.style.zIndex = '9999'
        input.style.pointerEvents = 'auto'
        const r = anchorEl?.getBoundingClientRect ? anchorEl.getBoundingClientRect() : null
        if(r){
          input.style.left = `${Math.max(8, Math.round(r.left))}px`
          input.style.top = `${Math.max(8, Math.round(r.bottom + 4))}px`
        }else{
          input.style.left = '16px'
          input.style.top = '16px'
        }
        document.body.appendChild(input)
        let resolved = false
        const done = () => {
          if(resolved) return
          resolved = true
          const val = (input.value || '').trim()
          input.remove()
          resolve(val || null)
        }
        input.addEventListener('change', done, { once:true })
        input.addEventListener('blur', ()=>setTimeout(done,150), { once:true })
        if(input.showPicker) input.showPicker(); else input.click()
        input.focus()
      })
    }


    async function loadDashboard(){
      try{
        const ticketsArr = await fetchTicketsFromDb()
        const normalizedTickets = ticketsArr.map(t => ({ ...t, comments: parseCommentsValue(t.comments) }))
        const users = Object.values((await db.ref("users_by_email").once("value")).val() || {})
        const activity = Object.values((await db.ref("activity_logs").limitToLast(10).once("value")).val() || {})

        let total = 0, unassigned = 0, doing = 0, done = 0
        const kpiSource = currentRole === "consultor" ? normalizedTickets.filter(t => String(t.informer||t.createdBy||"").toLowerCase() === String(currentUser?.email||"").toLowerCase()) : normalizedTickets
        kpiSource.forEach(t => {
          total++
          if(t.status === "unassigned") unassigned++
          if(t.status === "doing") doing++
          if(t.status === "done") done++
        })

        const ops = users.filter(u => u && u.role === "analista")
        const last = ops.map(u => u.lastAccessAt ? new Date(u.lastAccessAt).getTime() : 0).sort((a,b)=>b-a)[0] || 0

        document.getElementById("kpiTotal").innerText = total
        document.getElementById("kpiUnassigned").innerText = unassigned
        document.getElementById("kpiDoing").innerText = doing
        document.getElementById("kpiDone").innerText = done
        document.getElementById("kpiOperators").innerText = ops.length
        const lastAccessEl = document.getElementById("kpiLastAccess")
        if(lastAccessEl){
          lastAccessEl.innerText = last ? new Date(last).toLocaleString() : "Sin accesos"
        }


        const urgentContainer = document.getElementById("urgentAlerts")
        if(urgentContainer){
          const urgentTickets = normalizedTickets.filter(t => t.urgentRequested)
          urgentContainer.innerHTML = urgentTickets.length
            ? `<div class="feedItem" style="border-color:rgba(239,68,68,.55)"><div class="feedType">🚨 Alertas urgentes (${urgentTickets.length})</div>${urgentTickets.map(t => `<div class="feedMeta">${htmlEscape(t.id||"-")} · ${htmlEscape(t.title||"-")} · ${htmlEscape(t.client||"-")}</div>`).join("")}</div>`
            : `<div class="small">Sin alertas urgentes.</div>`
        }
        if(currentRole === "consultor") {
          const onlyMine = normalizedTickets.filter(t => String(t.informer||t.createdBy||"").toLowerCase() === String(currentUser.email||"").toLowerCase())
          const roleByEmail = Object.fromEntries(users.map(u => [String(u.email||"").toLowerCase(), u.role]))

          const commentsContainer = document.getElementById("consultorCommentsActivity")
          if(commentsContainer){
            const comments = onlyMine.flatMap(t => Object.values(t.comments||{}).filter(c => !c?.internal).map(c => ({ ticketId: t.id, ticketTitle: t.title, ...c })))
              .filter(c => { const r = roleByEmail[String(c.author||"").toLowerCase()]; return r === "admin" || r === "analista" })
              .sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))
            commentsContainer.innerHTML = comments.length
              ? comments.map(c => `<div class="feedItem" style="cursor:pointer" onclick="openTicketDetailModal('${c.ticketId||"-"}')"><div class="feedType">${htmlEscape(c.author||"-")}</div><div class="feedMeta">${htmlEscape(c.message||"")}<br>(${htmlEscape(c.ticketId||"-")} · ${htmlEscape(c.ticketTitle||"-")}) ${c.createdAt ? "· " + new Date(c.createdAt).toLocaleString() : ""}</div></div>`).join("")
              : `<p class="small">Sin comentarios aún.</p>`
          }

          const reqContainer = document.getElementById("consultorDeadlineRequests")
          if(reqContainer){
            const pending = onlyMine.filter(t => t.deadlineChangeStatus === 'pending')
            reqContainer.innerHTML = pending.length
              ? pending.map(t => `<div class="feedItem"><div class="feedTop"><div><div class="feedType">${htmlEscape(t.id||"-")} · ${htmlEscape(t.title||"-")}</div><div class="feedMeta">Nueva fecha solicitada: ${htmlEscape(t.requestedDeadline||"-")}</div></div><div class="inline" style="gap:6px"><button class="ghost" onclick="applyDeadlineDecision('${t.id}', true)">Aprobar</button><button class="danger" onclick="applyDeadlineDecision('${t.id}', false)">Rechazar</button></div></div></div>`).join("")
              : `<p class="small">Sin solicitudes pendientes.</p>`
          }
          return
        }

        const container = document.getElementById(currentRole === "admin" ? "adminRecentActivity" : "recentActivity")
        if(!container) return
        let sorted = activity.sort((a,b)=>new Date(b.timestampIso||0)-new Date(a.timestampIso||0))
        if(currentRole === "analista"){
          const myTickets = normalizedTickets.filter(t => String(t.assignedTo||"").toLowerCase() === String(currentUser.email||"").toLowerCase())
          const myTicketIds = new Set(myTickets.map(t => t.id))
          const roleByEmail = Object.fromEntries(users.map(u => [String(u.email||"").toLowerCase(), u.role]))
          sorted = sorted.filter(it => it.eventType === "ticket_comentario" && myTicketIds.has(it.ticketId) && roleByEmail[String(it.email||"").toLowerCase()] === "consultor")

          if(!sorted.length) container.innerHTML = `<p class="small">Sin comentarios recientes.</p>`
          else{
            container.innerHTML = sorted.map(it => `
              <div class="feedItem" style="cursor:pointer" onclick="openTicketDetailModal('${it.ticketId||"-"}')">
                <div class="feedTop">
                  <div>
                    <div class="feedType">Comentario reciente</div>
                    <div class="feedMeta">${htmlEscape(it.email || "sin-usuario")} · ${it.timestampIso ? new Date(it.timestampIso).toLocaleString() : ""}</div>
                  </div>
                  <span class="badge">${htmlEscape(it.ticketId || "-")}</span>
                </div>
              </div>
            `).join("")
          }

          const alertsContainer = document.getElementById("recentActivityAlerts")
          if(alertsContainer){
            const today = new Date()
            const alerts = myTickets
                            .map(t => {
                const businessDays = t.deadline ? businessDaysBetweenArg(today, new Date(`${t.deadline}T00:00:00`)) : null
                return { ticket: t, businessDays }
              })
              .filter(x => x.ticket.urgentRequested || (x.businessDays !== null && x.businessDays <= 5))
              .sort((a,b)=>a.businessDays-b.businessDays)

            alertsContainer.innerHTML = alerts.length
              ? alerts.map(({ticket, businessDays}) => `
                  <div class="feedItem">
                    <div class="feedTop">
                      <div>
                        <div class="feedType">${htmlEscape(ticket.id||"-")} · ${htmlEscape(ticket.title||"-")}</div>
                        <div class="feedMeta">${ticket.urgentRequested ? "🚨 Alerta urgente · " : ""}Deadline: ${htmlEscape(ticket.deadline||"-")} ${businessDays === null ? "" : `· Faltan ${businessDays} día(s) hábil(es) ARG`}</div>
                      </div>
                      <button class="ghost" onclick="requestDeadlineChangeFromDashboard('${ticket.id}', this)">Solicitar cambio de deadline</button>
                    </div>
                  </div>
                `).join("")
              : `<p class="small">Sin alertas ni tickets cerca de la deadline.</p>`
          }
          return
        }
        if(!sorted.length){
          container.innerHTML = `<p class="small">Sin actividad reciente.</p>`
        }else{
          container.innerHTML = sorted.map(it => `
            <div class="feedItem">
              <div class="feedTop">
                <div>
                  <div class="feedType">${htmlEscape(it.eventType || "evento")}</div>
                  <div class="feedMeta">${htmlEscape(it.email || "sin-usuario")} · ${it.timestampIso ? new Date(it.timestampIso).toLocaleString() : ""}</div>
                </div>
                <span class="badge ${it.role === "admin" ? "ok" : "off"}">${htmlEscape(it.role || "-")}</span>
              </div>
            </div>
          `).join("")
        }
      }catch(_){ }
    }

    async function ensureDefaultClients(){
      const samples = ["Cliente de prueba 1.", "Cliente de prueba 2."]
      const clients = Object.values((await db.ref("clients").once("value")).val() || {})
      for(const name of samples){
        const exists = clients.some(c => (c.name||"") === name)
        if(!exists){
          await db.ref("clients").child(emailKey(name)).set({ name, createdAt: new Date().toISOString(), createdBy: "system" })
          mirrorToSheet("upsertClient", { key: emailKey(name), name, createdAt: new Date().toISOString(), createdBy: "system" })
        }
      }
    }

    async function init(){
      try{
        applyTheme()
        renderLogin()
        await ensureDefaultUsers()
        await ensureDefaultClients()
      }catch(err){
        console.error("Error en inicialización:", err)
        renderLogin()
        showToast("La app inició con advertencias. Revisá la consola.", "error", 3000)
      }
    }

    init()
  </script>
