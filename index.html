<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablero de Tickets</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Ctext y=%2750%27 font-size=%2750%27%3E🎫%3C/text%3E%3C/svg%3E" />

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --bg-1: #080c14;
      --bg-2: #0d1525;
      --surface: rgba(13, 20, 38, 0.72);
      --surface-2: rgba(18, 28, 52, 0.55);
      --stroke: rgba(99, 132, 199, 0.18);
      --stroke-2: rgba(99, 132, 199, 0.10);
      --text: #e8edf5;
      --text-2: #b8c4d8;
      --muted: #6b7fa0;
      --accent: #3d6ef5;
      --accent-glow: rgba(61, 110, 245, 0.28);
      --accent-2: #22d4bf;
      --accent-2-glow: rgba(34, 212, 191, 0.22);
      --danger: #e04040;
      --danger-glow: rgba(224, 64, 64, 0.28);
      --ok: #22c77a;
      --warn: #f0a030;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --font: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', monospace;
      --shadow-card: 0 2px 24px rgba(0,0,0,.45), 0 1px 0 rgba(99,132,199,.08) inset;
      --shadow-btn: 0 4px 16px var(--accent-glow);
    }

    body.light {
      --bg-1: #f0f4fb;
      --bg-2: #e4eaf5;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-2: rgba(235, 241, 255, 0.75);
      --stroke: rgba(80, 110, 190, 0.20);
      --stroke-2: rgba(80, 110, 190, 0.12);
      --text: #111827;
      --text-2: #374151;
      --muted: #5a6b8a;
      --accent: #2455e8;
      --accent-glow: rgba(36, 85, 232, 0.20);
      --accent-2: #0d9b8a;
      --accent-2-glow: rgba(13, 155, 138, 0.18);
      --danger: #cc2828;
      --danger-glow: rgba(204, 40, 40, 0.20);
      --ok: #1aab68;
      --warn: #d97706;
      --shadow-card: 0 2px 20px rgba(50,70,120,.10), 0 1px 0 rgba(255,255,255,.8) inset;
      --shadow-btn: 0 4px 14px var(--accent-glow);
    }

    /* ── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      background:
        radial-gradient(ellipse 800px 600px at 15% -5%, rgba(61,110,245,.18) 0%, transparent 55%),
        radial-gradient(ellipse 700px 500px at 90% 10%, rgba(34,212,191,.12) 0%, transparent 55%),
        radial-gradient(ellipse 500px 400px at 50% 80%, rgba(61,110,245,.07) 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-2) 0%, var(--bg-1) 100%);
      min-height: 100vh;
      padding: clamp(12px, 2.2vw, 24px);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1440px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      padding: clamp(14px, 1.8vw, 20px);
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
      animation: fadeUp .32s cubic-bezier(.22,.68,0,1.2) both;
    }
    .topbarCard { position: relative; z-index: 120; overflow: visible; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px) scale(.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Buttons ───────────────────────────────────────────────────── */
    button, .btn {
      border: none;
      color: #fff;
      padding: 9px 15px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      letter-spacing: .01em;
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: linear-gradient(145deg, var(--accent), #2548cc);
      transition: transform .16s ease, box-shadow .2s ease, opacity .2s ease, background .2s ease;
      box-shadow: var(--shadow-btn);
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.10) 0%, transparent 100%);
      pointer-events: none;
    }

    button:hover, .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    button:active { transform: translateY(0); }

    button.secondary {
      background: var(--surface-2);
      border: 1px solid var(--stroke);
      color: var(--text-2);
      box-shadow: none;
    }
    button.secondary:hover { background: rgba(61,110,245,.12); color: var(--text); box-shadow: none; }

    button.danger {
      background: linear-gradient(145deg, #e85050, var(--danger));
      box-shadow: 0 4px 16px var(--danger-glow);
    }
    button.danger:hover { box-shadow: 0 8px 24px var(--danger-glow); }

    button.ghost {
      background: transparent;
      border: 1px solid var(--stroke);
      color: var(--muted);
      box-shadow: none;
    }
    button.ghost:hover { border-color: rgba(99,132,199,.45); color: var(--text-2); background: rgba(61,110,245,.06); }

    button:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
    .menuWrap { position: relative; }
    .menuDropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 200px;
      padding: 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stroke);
      background: var(--surface);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-card);
      z-index: 30;
      display: grid;
      gap: 6px;
    }
    .menuDropdown button { width: 100%; text-align: left; box-shadow: none; }

    /* ── Forms ─────────────────────────────────────────────────────── */
    label {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
      margin: 0 0 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 13px;
      font-size: 14px;
      font-family: var(--font);
      border-radius: var(--radius-sm);
      border: 1px solid var(--stroke);
      background: rgba(8, 12, 22, 0.55);
      color: var(--text);
      margin-bottom: 10px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    body.light input, body.light select, body.light textarea {
      background: rgba(255,255,255,.85);
      color: var(--text);
      border-color: var(--stroke);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: rgba(8, 12, 22, 0.75);
    }

    body.light input:focus, body.light select:focus, body.light textarea:focus {
      background: #fff;
    }

    textarea { min-height: 88px; resize: vertical; }

    select option { background: #111827; color: #e8edf5; }
    body.light select option { background: #f0f4fb; color: #111827; }

    /* ── Layout Helpers ────────────────────────────────────────────── */
    .small { font-size: 12px; color: var(--muted); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > * { flex: 1 1 220px; }
    .inline { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; align-items: stretch; }
    @media (min-width: 980px) { .grid { grid-template-columns: 1.2fr .9fr; } }

    /* ── Badges ────────────────────────────────────────────────────── */
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      letter-spacing: .02em;
    }
    .badge.ok  { color: #6ee8aa; border-color: rgba(34,199,122,.40); background: rgba(34,199,122,.12); }
    .badge.off { color: #faa5a5; border-color: rgba(224,64,64,.40);  background: rgba(224,64,64,.12); }

    /* ── Search ────────────────────────────────────────────────────── */
    .searchWrap { position: relative; }
    .searchWrap input { padding-left: 36px; margin: 0; }
    .searchWrap::before { content: '🔎'; position: absolute; left: 11px; top: 9px; opacity: .5; font-size: 13px; }

    /* ── KPI Grid ──────────────────────────────────────────────────── */
    .kpiGrid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .kpiGrid.singleRow { grid-template-columns: repeat(5, minmax(0, 1fr)) !important; }
    @media (max-width: 900px) { .kpiGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

    .kpi {
      padding: 14px 16px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: .6;
    }
    .kpi .label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .kpi .value { font-size: 24px; font-weight: 700; margin-top: 5px; color: var(--text); }

    /* ── Feed Items ────────────────────────────────────────────────── */
    .feedItem {
      padding: 11px 13px;
      border: 1px solid var(--stroke-2);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      margin-bottom: 8px;
      transition: border-color .2s ease, background .2s ease;
    }
    .feedItem:hover { border-color: var(--stroke); }
    .feedTop { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .feedType { font-weight: 600; font-size: 13.5px; }
    .feedMeta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .dashboardListScroll { max-height: 170px; overflow-y: auto; padding-right: 4px; }

    .supportFab {
      position: fixed; right: 22px; bottom: 22px; z-index: 140;
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 10px 24px var(--accent-glow);
    }

    /* ── Comments ──────────────────────────────────────────────────── */
    .commentsSection {
      margin-top: 14px;
      border-top: 1px solid var(--stroke-2);
      padding-top: 14px;
      background: rgba(8,12,22,.2);
      padding: 14px;
      border-radius: var(--radius-md);
    }
    .commentItem {
      padding: 12px 14px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: rgba(8, 12, 22, 0.35);
      margin-bottom: 10px;
      transition: border-color .18s ease;
    }
    .commentItem:hover { border-color: rgba(99,132,199,.32); }
    .commentHead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .commentActions { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); }
    .commentBody { margin-top: 5px; line-height: 1.6; }
    .commentFooter { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 8px; }
    .commentDeleteText { font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; box-shadow: none; }
    .commentDeleteText:hover { color: var(--danger); }
    .commentsHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .commentsTitle { font-size: 20px; font-weight: 700; }
    .activityTabs { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; }
    .activityTab { padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--stroke); background: transparent; color: var(--text-2); cursor: pointer; font-size: 13px; font-family: var(--font); transition: all .18s; }
    .activityTab:hover { background: rgba(61,110,245,.08); }
    .activityTab.active { background: rgba(61,110,245,.18); border-color: rgba(61,110,245,.50); color: #a5bfff; }
    .commentComposer { margin-top: 10px; border: 1px solid var(--stroke); border-radius: var(--radius-md); padding: 12px; background: rgba(8,12,22,.3); }

    /* ── Toggle Switch ─────────────────────────────────────────────── */
    .switchWrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: rgba(80,100,140,.5); border-radius: 999px; transition: .22s; border: 1px solid var(--stroke); }
    .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 2px; top: 2px; background: white; border-radius: 50%; transition: .22s; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .switch input:checked + .slider { background: linear-gradient(135deg, var(--accent), #2548cc); border-color: transparent; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    /* ── Avatars ───────────────────────────────────────────────────── */
    .commentAvatar { width: 28px; height: 28px; border-radius: 999px; object-fit: cover; border: 2px solid var(--stroke); margin-right: 8px; }
    .commentHeadLeft { display: flex; align-items: center; }
    .assignedAvatarRow { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .assignedAvatar { width: 24px; height: 24px; border-radius: 999px; object-fit: cover; border: 2px solid var(--stroke); }

    /* ── Misc UI ───────────────────────────────────────────────────── */
    .sortBtn { padding: 6px 10px; }
    .commentItem.internal { border-color: rgba(240,192,60,.55); background: rgba(240,192,60,.10); }
    .internalBadge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(240,192,60,.22); color: #fde68a; border: 1px solid rgba(240,192,60,.55); margin-left: 8px; }
    .attachBtn { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; padding: 0; font-size: 16px; }
    .attachInput { display: none; }
    .ticket.dragging { opacity: .4; transform: scale(.97); }
    .column.dropTarget { outline: 2px dashed rgba(61,110,245,.7); outline-offset: 3px; }
    .commentItem.maximumAttention { border-color: rgba(224,64,64,.65); background: rgba(224,64,64,.14); }
    .attentionBadge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(224,64,64,.22); color: #fecaca; border: 1px solid rgba(224,64,64,.55); margin-left: 8px; }
    .commentToolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .colorBtn { width: 34px; height: 30px; border-radius: var(--radius-sm); border: 1px solid var(--stroke); display: inline-flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: linear-gradient(135deg, #ef4444, #f59e0b, #22c55e, #3b82f6, #8b5cf6); }
    .colorBtn span { font-weight: 800; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
    .colorBtn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .timeBox { margin-top: 10px; padding: 12px; border: 1px solid var(--stroke); border-radius: var(--radius-md); background: rgba(8,12,22,.25); }
    .helpIcon { width: 24px; height: 24px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; padding: 0; }
    .timerLive { font-size: 12px; color: var(--muted); margin-top: 6px; font-family: var(--font-mono); }
    .readTick { font-weight: 700; color: var(--muted); margin-left: 4px; }
    .readTick.read { color: var(--accent); }
    .commentEditor { min-height: 90px; border: 1px solid var(--stroke); border-radius: var(--radius-sm); padding: 10px 12px; background: rgba(8,12,22,.4); outline: none; font-family: var(--font); font-size: 14px; color: var(--text); transition: border-color .2s, box-shadow .2s; }
    .commentEditor:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .commentEditor:empty::before { content: attr(data-placeholder); color: var(--muted); }
    .commentBody.formatted p { margin: .25rem 0; }
    .commentBody.formatted ul { margin: .25rem 0 .25rem 1.25rem; }

    /* ── Priority / Urgent flags ───────────────────────────────────── */
    .urgentTopFlag {
      display: inline-block;
      background: linear-gradient(135deg, #c41818, #e04040);
      color: #fff;
      padding: 5px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      box-shadow: 0 6px 20px rgba(224,64,64,.42);
      letter-spacing: .02em;
    }
    .urgentFlag { font-size: 11px; color: #fca5a5; margin-top: 6px; }
    .urgentBtn { background: linear-gradient(135deg, #f59e0b, #e04040); box-shadow: 0 4px 16px rgba(224,64,64,.35); }

    /* ── Ticket Detail Layout ──────────────────────────────────────── */
    .detailLayout { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .codeBadge {
      display: inline-block;
      background: rgba(61,110,245,.18);
      color: #93b4ff;
      padding: 5px 11px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      border: 1px solid rgba(61,110,245,.38);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .03em;
    }
    @media (min-width: 980px) {
      .detailLayout.withSidebar { grid-template-columns: 1.55fr .55fr; }
      .detailSidebar { border-left: 1px solid var(--stroke); padding-left: 14px; }
    }

    /* ── Light mode overrides ──────────────────────────────────────── */
    body.light .ticket, body.light .column, body.light .feedItem, body.light .commentItem {
      background: rgba(255,255,255,.88);
      color: var(--text);
      border-color: rgba(80,110,190,.22);
      box-shadow: 0 2px 16px rgba(50,70,120,.08);
    }
    body.light .ticket .meta, body.light .small, body.light .feedMeta, body.light label { color: var(--muted); }
    body.light .column h4 { color: var(--text-2); }
    body.light .detailSidebar { background: rgba(230,238,255,.70); border-radius: var(--radius-md); padding: 14px; }
    body.light .codeBadge { background: rgba(36,85,232,.15); color: #1c3cb0; border-color: rgba(36,85,232,.30); }
    body.light .commentItem.internal, body.light .commentItem.maximumAttention { color: var(--text); }
    body.light .commentItem.internal .commentBody, body.light .commentItem.maximumAttention .commentBody,
    body.light .commentItem.internal strong, body.light .commentItem.maximumAttention strong { color: var(--text); }
    body.light .commentEditor { background: rgba(255,255,255,.85); }
    body.light .commentsSection { background: rgba(230,238,255,.35); }

    /* ── Kanban Board ──────────────────────────────────────────────── */
    .boardWrap { overflow-x: auto; overflow-y: visible; padding-bottom: 6px; }
    .board { display: grid; grid-template-columns: repeat(5, minmax(260px, 1fr)); gap: 14px; overflow: visible; align-items: start; }

    .column {
      background: var(--surface-2);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      padding: 12px;
      min-height: 220px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .column h4 {
      margin: 0 0 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: .08em;
    }

    .ticket {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 11px 12px 11px 15px;
      margin-bottom: 8px;
      border-left: 3px solid rgba(99,132,199,.4);
      transition: transform .16s ease, box-shadow .2s ease, border-color .2s ease;
      cursor: pointer;
    }
    .ticket:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); border-color: rgba(99,132,199,.35); }

    .ticket.problemFlag { border-left-color: var(--danger) !important; background: rgba(224,64,64,.12); }
    .ticket.priorityAlta  { border-left-color: var(--danger); }
    .ticket.priorityMedia { border-left-color: var(--warn); }
    .ticket.priorityBaja  { border-left-color: var(--ok); }

    .ticket h5 { margin: 0 0 7px; font-size: 13.5px; font-weight: 600; line-height: 1.4; }
    .ticketCode { font-size: 11px; color: var(--muted); font-weight: 600; margin-right: 6px; font-family: var(--font-mono); letter-spacing: .03em; }
    .ticketCode.clickable { cursor: pointer; text-decoration: underline dotted; }
    .deadline { color: #f87171; font-weight: 600; }
    .ticket p { margin: 0 0 7px; font-size: 13px; color: var(--text-2); }
    .ticket .meta { font-size: 11px; color: var(--muted); }

    /* ── Modal ─────────────────────────────────────────────────────── */

    async function hashPassword(password, salt){
      const data = new TextEncoder().encode(`${salt}:${password}`)
      const digest = await crypto.subtle.digest("SHA-256", data)
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2,"0")).join("")
    }

    async function parseSpreadsheetRows(file){
      const ext = String(file?.name||"").toLowerCase()
      if(ext.endsWith('.csv')){
        const txt = await file.text()
        return parseCsvRows(txt)
      }
      if(typeof XLSX === 'undefined') throw new Error('No se pudo cargar el parser de Excel (XLSX)')
      const buffer = await file.arrayBuffer()
      const wb = XLSX.read(buffer, { type: 'array' })
      const sheet = wb.Sheets[wb.SheetNames[0]]
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 })
      return rows.map(r => (r||[]).map(c => String(c??'').trim())).filter(r => r.some(Boolean))
    }

    async function importUsersFromFile(){
      if(currentRole !== 'admin') return alert('Solo admin puede importar usuarios')
      const file = document.getElementById('uImportFile')?.files?.[0]
      if(!file) return alert('Seleccioná un archivo')
      const rows = await parseSpreadsheetRows(file)
      if(rows.length < 2) return alert('Archivo sin datos')
      const header = rows[0].map(h=>h.toLowerCase())
      const iEmail = header.indexOf('email'); const iPass = header.indexOf('password'); const iRole = header.indexOf('role')
      if(iEmail < 0 || iPass < 0 || iRole < 0) return alert('Columnas requeridas: email,password,role')
      let count = 0
      for(const row of rows.slice(1)){
        const email = String(row[iEmail]||'').trim().toLowerCase()
        const password = String(row[iPass]||'').trim()
        const role = String(row[iRole]||'consultor').trim().toLowerCase()
        if(!email || !password) continue
        const policy = passwordPolicyError(password)
        if(policy) continue
        const secureFields = await buildPasswordFields(password)
        const payload = { key: emailKey(email), email, password: "", role, active: true, createdAt: new Date().toISOString(), createdBy: currentUser.email, ...secureFields, photoUrl:'', photoFileId:'' }
        await adminWrite('upsertUser', payload)
        await db.ref('users_by_email').child(payload.key).set(payload)
        count++
      }
      showToast(`Usuarios importados: ${count}`, 'ok')
      await loadUsersAdmin(); await loadFilterOptions()
    }

    async function uploadAttachmentFile(file){
      const b64 = await new Promise((resolve,reject)=>{
        const r = new FileReader()
        r.onload = () => resolve(String(r.result||"").split(",")[1] || "")
        r.onerror = reject
        r.readAsDataURL(file)
      })
      const res = await sheetWrite("uploadDriveFile", {
        folderId: DRIVE_FOLDER_ID,
        fileName: file.name,
        mimeType: file.type || "application/octet-stream",
        contentBase64: b64
      })
      if(!res || !res.ok || !res.url) throw new Error("No se pudo subir archivo")
      return { name: file.name, url: res.url, fileId: res.fileId||"" }
    }


    async function readFileAsDataUrl(file){
      return await new Promise((resolve,reject)=>{
        const r = new FileReader()
        r.onload = () => resolve(String(r.result||""))
        r.onerror = reject
        r.readAsDataURL(file)
      })
    }

        return { name: file.name, url: dataUrl, fileId: "", inline: true }
      }
    }

    function buildTicketCode(list){
      const max = (list||[]).reduce((acc, t) => {
        const m = String(t.id||"").match(/^TAO-(\d+)$/)
        if(!m) return acc
        return Math.max(acc, Number(m[1]))
      }, 0)
      const next = max + 1
      return `TAO-${String(next).padStart(2,"0")}`
    }

    async function sheetWrite(action, payload){
      if(!SHEET_WEBHOOK_URL){
        alert("Falta configurar SHEET_WEBHOOK_URL para guardar cambios en Google Sheets")
        throw new Error("SHEET_WEBHOOK_URL no configurada")
      }

      // Enviamos text/plain para evitar preflight CORS en hosting estático (GitHub Pages).
      const requestBody = JSON.stringify({ action, payload, sheetId: SHEET_ID, gid: SHEET_GID, ticketSheet: SHEET_TICKETS_NAME, adminSheet: SHEET_ADMINS_NAME, timesSheet: SHEET_TIMES_NAME })
      const res = await fetch(SHEET_WEBHOOK_URL, {
        method: "POST",
        mode: "cors",
        redirect: "follow",
        body: requestBody
      })

      if(!res.ok) throw new Error(`No se pudo escribir en Google Sheets (${res.status})`)
      const data = await res.json().catch(() => ({ ok: true }))
      if(data && data.ok === false){
        const rawError = String(data.error || "Error al guardar en Google Sheets")
        if(rawError.includes("setHeaders")) throw new Error("Tu Apps Script está desactualizado (usa response.setHeaders). Reemplazá el script por APPS_SCRIPT.gs y volvé a desplegar la Web App.")
        if(rawError.includes("Acción no soportada") && (action === "upsertUser" || action === "deleteUser")) return { ok: true, ignored: true }
        if(rawError.includes("Acción no soportada") && action === "uploadDriveFile") throw new Error("Tu Apps Script desplegado no soporta uploadDriveFile. Reemplazá APPS_SCRIPT.gs y volvé a desplegar la Web App.")
        throw new Error(rawError)
      }
      return data
    }

    async function verifyPassword(user, password){
      if(user?.passwordHash && user?.passwordSalt){
        const computed = await hashPassword(password, user.passwordSalt)
        return computed === user.passwordHash
      }
      return String(user?.password || "") === String(password || "")
    }

    function mustRotatePassword(user){
      if(!user?.passwordHash) return true
      const updatedAt = new Date(user.passwordUpdatedAt || 0)
      const ageDays = (Date.now() - updatedAt.getTime()) / 86400000
      return !updatedAt.getTime() || ageDays > 180
    }

    async function rotatePasswordFlow(user){
      const current = prompt("Por seguridad tenés que actualizar tu contraseña.\nIngresá tu contraseña actual:")
      if(current === null) return false
      const validCurrent = await verifyPassword(user, current)
      if(!validCurrent) return alert("La contraseña actual no coincide."), false

      const next = prompt("Ingresá una nueva contraseña segura (mínimo 12, mayúscula, minúscula, número y símbolo):")
      if(next === null) return false
      const policy = passwordPolicyError(next)
      if(policy) return alert(policy), false

      const confirmNext = prompt("Confirmá la nueva contraseña:")
      if(confirmNext !== next) return alert("La confirmación no coincide."), false

      const secureFields = await buildPasswordFields(next)
      const payload = {
        ...user,
        key: emailKey(user.email),
        password: "",
        ...secureFields
      }
      await db.ref("users_by_email").child(payload.key).update(payload)
      await adminWrite("upsertUser", payload).catch(()=>{})
      showToast("Contraseña actualizada correctamente.", "ok")
      return true
    }

      const email = document.getElementById("loginEmail").value.trim().toLowerCase()

        const validPassword = await verifyPassword(user, password)
        if(!validPassword){
          const legacyHints = LEGACY_PASSWORD_HINTS[email] || []
          if(legacyHints.includes(password)){
            return alert("La contraseña 1234 fue deshabilitada por seguridad. Probá con la contraseña actual del admin o usá 'Olvide la contraseña'.")
          }
          return alert("Contraseña incorrecta")
        }
        const twoFactorEnabled = String(user.twoFactorEnabled || "").toLowerCase() === "true" || user.twoFactorEnabled === true
        if(twoFactorEnabled){
          const code = prompt("Ingresá el código de 6 dígitos de Google Authenticator:")
          if(code === null) return
          const validCode = await verifyTotpCode(user.twoFactorSecret || "", code)
          if(!validCode) return alert("Código de inicio seguro inválido.")
        }

        if(!user.passwordHash && user.password){
          const secureFields = await buildPasswordFields(password)
          const migrated = { ...user, key: emailKey(email), password: "", ...secureFields }
          await db.ref("users_by_email").child(migrated.key).update(migrated)
          adminWrite("upsertUser", migrated).catch(()=>{})
        }

        currentUser = { email: user.email }
        currentRole = user.role
        persistSession()

        renderApp()
        logActivity("login", { userAgent: navigator.userAgent })
        adminWrite("upsertUser", { ...user, key: emailKey(email), lastAccessAt: new Date().toISOString() }).catch(()=>{})
        if(mustRotatePassword(user)){
          setTimeout(() => { rotatePasswordFlow(user) }, 250)

      }finally{
        loginInProgress = false
        if(btn){ btn.disabled = false; btn.textContent = "Entrar" }
      }
    }

    function randomBase32Secret(len = 32){
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"
      const bytes = new Uint8Array(len)
      crypto.getRandomValues(bytes)
      let out = ""
      for(let i=0;i<len;i++) out += alphabet[bytes[i] % alphabet.length]
      return out
    }

    function base32ToBytes(base32){
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"
      const clean = String(base32||"").toUpperCase().replace(/=+$/,"").replace(/[^A-Z2-7]/g,"")
      let bits = ""
      for(const ch of clean){
        const val = alphabet.indexOf(ch)
        if(val < 0) continue
        bits += val.toString(2).padStart(5,"0")
      }
      const bytes = []
      for(let i=0;i+8<=bits.length;i+=8) bytes.push(parseInt(bits.slice(i,i+8),2))
      return new Uint8Array(bytes)
    }

    async function generateTotpCode(secret, timestampMs = Date.now()){
      const keyBytes = base32ToBytes(secret)
      if(!keyBytes.length) return ""
      const counter = Math.floor(timestampMs / 30000)
      const msg = new ArrayBuffer(8)
      const view = new DataView(msg)
      view.setUint32(0, Math.floor(counter / 0x100000000), false)
      view.setUint32(4, counter >>> 0, false)
      const cryptoKey = await crypto.subtle.importKey("raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"])
      const sig = new Uint8Array(await crypto.subtle.sign("HMAC", cryptoKey, msg))
      const offset = sig[sig.length - 1] & 0x0f
      const bin = ((sig[offset] & 0x7f) << 24) | (sig[offset+1] << 16) | (sig[offset+2] << 8) | sig[offset+3]
      return String(bin % 1000000).padStart(6, "0")
    }

    async function verifyTotpCode(secret, code){
      const normalized = String(code||"").replace(/\s+/g, "")
      if(!/^\d{6}$/.test(normalized)) return false
      const now = Date.now()
      for(const drift of [-1,0,1]){
        const expected = await generateTotpCode(secret, now + drift*30000)
        if(expected === normalized) return true
      }
      return false
    }

    async function saveTicket(){
      const title = document.getElementById("tTitle").value.trim()
      const description = document.getElementById("tDescription").value.trim()
      const priority = document.getElementById("tPriority").value
      const client = document.getElementById("tClient").value.trim()
      const deadline = document.getElementById("tDeadline").value
      const informer = (document.getElementById("tInformer")?.value || currentUser.email).trim().toLowerCase()
      const customFieldsDefs = await getTicketCustomFields()
      const customFields = {}
      for(const field of customFieldsDefs){
        const input = document.querySelector(`[data-custom-field="${field.key}"]`)
        const value = String(input?.value ?? "").trim()
        if(field.required && !value) return alert(`Completá el campo obligatorio: ${field.label}`)
        customFields[field.key] = value
      }

      if(!title || !description || !client) return alert("Completá título, detalle y cliente/área")
      if(!informer) return alert("Seleccioná informador")

      showToast("Creando ticket...", "info", 1600)
      const now = new Date().toISOString()
      const code = buildTicketCode(cachedTickets)
      const ticket = {
        id: code,
        title, description, priority, client, deadline,
        status: "unassigned",
        assignedTo: "",
        comments: {},
        createdAt: now,
        createdBy: currentUser.email,
        updatedAt: now,
        updatedBy: currentUser.email,
        informer,
        requestedDeadline: "",
        deadlineChangeStatus: "none",
        deadlineChangeRequestedBy: "",
        deadlineChangeRequestedAt: "",
        deadlineChangeReviewedBy: "",
        hasProblem: false,
        problemReportedBy: "",
        problemReportedAt: "",
        helpers: [],
        timeTracking: { users: {}, consolidatedMinutes: 0 },
        customFields
      }

      const dbKey = emailKey(code)
      await db.ref("tickets").child(dbKey).set(ticket)
      const savedTicket = { ...ticket, dbKey }
      mirrorToSheet("createTicket", savedTicket)
      logActivity("ticket_creado", { title, client, code })
      closeTicketModal()
      loadDashboard()
      showToast(`Ticket ${code} creado correctamente`, "ok")
    }

    async function loadTickets(){
      setupRealtimeStreams()
      const container = document.getElementById("boardContainer")
      if(!container) return
      renderTicketsFromData(cachedTickets || [])
      if(pendingOpenTicketId && (cachedTickets||[]).some(t => t.id === pendingOpenTicketId)){
        const toOpen = pendingOpenTicketId
        pendingOpenTicketId = ""
        openTicketDetailModal(toOpen)
      }
    }



    function renderTicketsFromData(data){
      const container = document.getElementById("boardContainer")
      if(!container) return
      const grouped = { unassigned: [], todo: [], doing: [], recurrent: [], done: [] }
      const visibleTickets = []

      Object.entries(data).forEach(([_, t]) => {
        const canSeeTicket = currentRole === "admin" || currentRole === "analista" || (currentRole === "consultor" && ((t.informer||t.createdBy||"").toLowerCase() === (currentUser.email||"").toLowerCase()))
        if(!canSeeTicket) return

        const haystack = `${t.title||""} ${t.description||""} ${t.client||""} ${t.createdBy||""}`.toLowerCase()
        if(ticketSearchTerm && !haystack.includes(ticketSearchTerm)) return
        if(ticketFilterClient && !(String(t.client||"").toLowerCase().includes(ticketFilterClient))) return
        if(ticketFilterAnalyst && !(String(t.assignedTo||"").toLowerCase().includes(ticketFilterAnalyst))) return

        const status = grouped[t.status] ? t.status : "unassigned"
        grouped[status].push(t)
        visibleTickets.push(t)
      })

      if(currentRole === "consultor"){
        container.innerHTML = renderConsultorTicketList(visibleTickets)
        return
      }

      const maxTicketsInColumn = Math.max(...Object.values(grouped).map(arr => arr.length), 0)
      const uniformHeight = Math.max(220, 120 + maxTicketsInColumn * 190)

      container.innerHTML = `<div class="board">${Object.entries(STATUS).map(([status, label]) => `
        <div class="column" style="min-height:${uniformHeight}px" ondragover="onColumnDragOver(event)" ondragleave="onColumnDragLeave(event)" ondrop="onColumnDrop(event,'${status}')">
          <h4>${label} <span class="small">(${grouped[status].length})</span></h4>
          ${grouped[status].map(t => renderTicketCard(t, status)).join("") || `<p class="small">Sin tickets</p>`}
        </div>
      `).join("")}</div>`
    }

    function unreadCommentsCount(ticket){
      if(!ticket?.comments) return 0
      const myKey = emailKey(currentUser?.email || "")
      return Object.values(ticket.comments).filter(c => {
        const comment = c || {}
        const author = String(comment.author || "").toLowerCase()
        if(!author || author === String(currentUser?.email || "").toLowerCase()) return false
        const readBy = comment.readBy || {}
        return !readBy[myKey]
      }).length
    }

    async function assignTicketOwner(id){
      if(!(currentRole === "admin" || currentRole === "analista")) return
      const owner = (document.getElementById(`detail-owner-${id}`)?.value || "").trim().toLowerCase()
      if(!owner) return alert("Seleccioná un responsable")
      const ticket = cachedTickets.find(t => t.id === id)
      if(!ticket) return
      const tracking = JSON.parse(JSON.stringify(ticket.timeTracking || { users:{}, consolidatedMinutes:0 }))
      const ownerKey = emailKey(owner)
      if(!tracking.users[ownerKey]) tracking.users[ownerKey] = { email: owner, totalMinutes: 0, timerStartAt: "" }
      const updated = { ...ticket, assignedTo: owner, timeTracking: tracking, updatedAt: new Date().toISOString(), updatedBy: currentUser.email }
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id, ...updated })
      const ix = cachedTickets.findIndex(t => t.id === id)
      if(ix >= 0) cachedTickets[ix] = updated
      showToast("Responsable asignado", "ok")
      openTicketDetailModal(id)
    }

    async function autoSaveTicketDetail(id){
      if(!(currentRole === "admin" || currentRole === "analista")) return
      const ticket = cachedTickets.find(t => t.id === id)
      if(!ticket) return
      const canEditFields = currentRole === "admin"
      const nextAssignedTo = (document.getElementById(`detail-owner-${id}`)?.value || ticket.assignedTo || "").trim().toLowerCase()
      const tracking = JSON.parse(JSON.stringify(ticket.timeTracking || { users:{}, consolidatedMinutes:0 }))
      if(nextAssignedTo){
        const ownerKey = emailKey(nextAssignedTo)
        if(!tracking.users[ownerKey]) tracking.users[ownerKey] = { email: nextAssignedTo, totalMinutes: 0, timerStartAt: "" }
        if(!tracking.users[ownerKey].email) tracking.users[ownerKey].email = nextAssignedTo
      }
      tracking.consolidatedMinutes = recomputeConsolidatedMinutes(tracking)
      const updated = {
        ...ticket,
        title: canEditFields ? ((document.getElementById(`detail-title-${id}`)?.value || "").trim() || ticket.title) : ticket.title,
        description: canEditFields ? ((document.getElementById(`detail-description-${id}`)?.value || "").trim() || ticket.description) : ticket.description,
        priority: canEditFields ? (document.getElementById(`detail-priority-${id}`)?.value || ticket.priority) : ticket.priority,
        client: canEditFields ? ((document.getElementById(`detail-client-${id}`)?.value || "").trim() || ticket.client) : ticket.client,
        informer: canEditFields ? ((document.getElementById(`detail-informer-${id}`)?.value || ticket.informer || ticket.createdBy).trim().toLowerCase()) : (ticket.informer || ticket.createdBy),
        assignedTo: nextAssignedTo,
        deadline: canEditFields ? ((document.getElementById(`detail-deadline-${id}`)?.value || "").trim()) : ticket.deadline,
        status: (document.getElementById(`detail-status-${id}`)?.value || ticket.status),
        timeTracking: tracking,
        updatedAt: new Date().toISOString(),
        updatedBy: currentUser.email
      }
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id, ...updated })
      const ix = cachedTickets.findIndex(t => t.id === id)
      if(ix >= 0) cachedTickets[ix] = updated
      renderTicketsFromData(cachedTickets)
      await loadDashboard()
      showToast("Ticket actualizado", "ok")
    }

      const historyEl = document.getElementById(`ticket-history-tab-${ticketId}`)

    async function ensureCurrentMonthFolderForTicket(ticketId){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return
      const tracking = JSON.parse(JSON.stringify(ticket.timeTracking || { users:{}, consolidatedMinutes:0 }))
      const currentKey = monthFolderKey()
      const exists = !!(tracking.monthlyFolders && tracking.monthlyFolders[currentKey])
      ensureMonthFolder(tracking, currentKey)
      timeMonthTabByTicket[ticketId] = currentKey
      if(exists) return
      const updated = { ...ticket, timeTracking: tracking, updatedAt: new Date().toISOString(), updatedBy: currentUser.email }
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id: ticketId, ...updated })
      const ix = cachedTickets.findIndex(t => t.id === ticketId)
      if(ix >= 0) cachedTickets[ix] = updated
    }

    async function setTimeMonthTab(ticketId, monthKey){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return
      const tracking = JSON.parse(JSON.stringify(ticket.timeTracking || { users:{}, consolidatedMinutes:0 }))
      const exists = !!(tracking.monthlyFolders && tracking.monthlyFolders[monthKey])
      ensureMonthFolder(tracking, monthKey)
      timeMonthTabByTicket[ticketId] = monthKey
      if(!exists){
        const updated = { ...ticket, timeTracking: tracking, updatedAt: new Date().toISOString(), updatedBy: currentUser.email }
        await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
        mirrorToSheet("updateTicket", { id: ticketId, ...updated })
        const ix = cachedTickets.findIndex(t => t.id === ticketId)
        if(ix >= 0) cachedTickets[ix] = updated
      }else{
        ticket.timeTracking = tracking
      }
      openTicketDetailModal(ticketId)
    }

    function renderTimesTab(ticketId, usersByEmail){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return '<div class="small">Sin datos de tiempo</div>'
      const tracking = ticket.timeTracking || { users:{}, consolidatedMinutes:0 }
      const currentMonthKey = monthFolderKey()
      ensureMonthFolder(tracking, currentMonthKey)
      const helpers = Array.from(new Set([...(ticket.helpers||[]), ...(ticket.assignedTo ? [ticket.assignedTo] : [])])).filter(Boolean)
      const analysts = Object.values(usersByEmail||{}).filter(u => u && u.role === 'analista' && u.active !== false).map(u => (u.email||'').toLowerCase()).sort()
      const options = `<option value="">Seleccionar analista</option>${analysts.map(a => `<option value="${htmlEscape(a)}">${htmlEscape(userDisplayNameByEmail(a))}</option>`).join('')}`
      const monthKeys = Object.keys(tracking.monthlyFolders || {}).sort()
      const selectedMonth = timeMonthTabByTicket[ticketId] && monthKeys.includes(timeMonthTabByTicket[ticketId]) ? timeMonthTabByTicket[ticketId] : currentMonthKey
      timeMonthTabByTicket[ticketId] = selectedMonth
      const monthData = tracking.monthlyFolders?.[selectedMonth] || { label: monthFolderLabel(selectedMonth), entries: [] }
      const entries = Array.isArray(monthData.entries) ? [...monthData.entries] : []
      entries.sort((a,b)=> new Date(b.loggedDate||b.createdAt||0) - new Date(a.loggedDate||a.createdAt||0))

      const rows = {}
      Object.entries(tracking.users || {}).forEach(([k,v]) => rows[k] = { ...(v||{}) })
      helpers.forEach(email => {
        const k = emailKey(email)
        if(!rows[k]) rows[k] = { email, totalMinutes:0, timerStartAt:'' }
      })

      const userRows = Object.entries(rows)
      const canManageHelpers = currentRole === 'admin' || currentRole === 'analista'
      const helpersHtml = userRows.length ? userRows.map(([uk, u]) => {
        const email = String(u?.email || '')
        const mine = emailKey(email) === emailKey(currentUser.email) || uk === emailKey(currentUser.email)
        const running = !!u?.timerStartAt
        const removable = canManageHelpers && (ticket.helpers || []).some(h => emailKey(h) === emailKey(email))
        return `<div class="feedItem"><div class="inline" style="justify-content:space-between;align-items:center;gap:8px"><div><strong>${htmlEscape(userDisplayNameByEmail(email||'-'))}</strong><div class="small">${htmlEscape(email||'-')} · Total: ${fmtMinutes(u?.totalMinutes||0)}</div></div><div class="inline" style="gap:6px;align-items:center">${mine ? `<input id="manual-hours-${ticketId}-${uk}" type="number" min="0" placeholder="hs" style="margin:0;max-width:70px"><input id="manual-mins-${ticketId}-${uk}" type="number" min="0" placeholder="min" style="margin:0;max-width:70px"><button class="ghost" onclick="logManualTimeForUser('${ticketId}','${uk}','${selectedMonth}')">Cargar</button><button id="timer-toggle-${ticketId}-${uk}" class="ghost" onclick="toggleTicketTimerForUser('${ticketId}','${uk}','${selectedMonth}')">${running ? '🕒 Parar timer' : '🕒 Iniciar timer'}</button>` : ''}<span id="timer-live-${ticketId}-${uk}" class="timerLive">🕒 ${running ? '00:00:00' : '00:00:00'}</span>${removable ? `<button class="danger" onclick="removeHelperFromTicket('${ticketId}','${uk}')">Quitar</button>` : ''}</div></div></div>`
      }).join('') : '<div class="small">Todavía no hay tiempos cargados.</div>'
      const entriesHtml = entries.length ? entries.map(e => `<div class="feedItem"><div class="inline" style="justify-content:space-between;gap:8px"><div><strong>${htmlEscape(userDisplayNameByEmail(e.analyst||'-'))}</strong><div class="small">${htmlEscape(e.loggedDate||'-')}</div></div><div><strong>${Number(e.hours||0).toFixed(2)} h</strong></div></div></div>`).join("") : '<div class="small">Sin tiempos cargados en esta carpeta.</div>'

      return `<div>
        ${(currentRole === 'admin' || currentRole === 'analista') ? `<div style="margin-bottom:8px"><div class="small" style="margin-bottom:4px">OWNER DE LA TAREA</div><div class="inline" style="align-items:center;gap:8px;flex-wrap:nowrap"><select id="detail-owner-${ticketId}" style="margin:0;max-width:260px;min-width:260px"><option value="">Sin asignar</option>${analysts.map(a => `<option value="${htmlEscape(a)}" ${String(ticket.assignedTo||'').toLowerCase()===a?'selected':''}>${htmlEscape(userDisplayNameByEmail(a))}</option>`).join('')}</select><button class="ghost" style="margin:0" onclick="assignTicketOwner('${ticketId}')">Asignar como responsable</button></div></div>` : ''}
        <div class="inline" style="margin-bottom:8px;gap:8px;align-items:center"><select id="helper-analyst-${ticketId}" style="margin:0;max-width:260px">${options}</select><button class="ghost" onclick="assignHelperFromDropdown('${ticketId}')">Sumar ayudante</button></div>
        <div class="small" style="margin-bottom:6px">Carpetas por mes:</div>
        <div class="inline" style="margin-bottom:10px">${monthKeys.map(mk => `<button class="${selectedMonth===mk?'':'ghost'}" onclick="setTimeMonthTab('${ticketId}','${mk}')">${htmlEscape(monthFolderLabel(mk))}</button>`).join('')}</div>
        <div class="card" style="padding:10px;margin-bottom:10px">
          <div class="small" style="margin-bottom:6px">Carpeta activa: <strong>${htmlEscape(monthData.label || monthFolderLabel(selectedMonth))}</strong></div>
          ${entriesHtml}
        </div>
        <div class="small" style="margin-bottom:8px">Ayudantes: ${htmlEscape(helpers.join(', ') || 'Ninguno')}</div>
        ${helpersHtml}
      </div>`
    }

    function normalizeReactionData(reactions){
      const src = reactions || {}
      const normalized = {}
      Object.entries(src).forEach(([key, value]) => {
        if(value && value.users && typeof value.users === "object"){
          normalized[key] = { emoji: value.emoji || emojiFromReactionKey(key) || "🙂", users: { ...(value.users || {}) } }
          return
        }
        if(value && typeof value === "object"){
          normalized[key] = { emoji: emojiFromReactionKey(key) || "🙂", users: { ...value } }
        }
      })
      return normalized
    }

    function renderReactionButtons(ticketId, commentId, reactions){
      const normalized = normalizeReactionData(reactions)
      const defaults = ["👍", "❤️", "👀"]
      defaults.forEach(emoji => {
        const key = reactionKeyFromEmoji(emoji)
        if(!normalized[key]) normalized[key] = { emoji, users: {} }
      })
      const items = Object.entries(normalized)
        .sort((a,b) => defaults.indexOf(a[1].emoji) - defaults.indexOf(b[1].emoji))
        .map(([key, info]) => `<button class="ghost" style="padding:4px 8px" onclick="reactToComment('${ticketId}','${commentId}','${htmlEscape(info.emoji)}')">${htmlEscape(info.emoji)} ${Object.keys(info.users||{}).length}</button>`)
      items.push(`<button class="ghost" style="padding:4px 8px" onclick="pickCustomReaction('${ticketId}','${commentId}',event)">➕ Emoji</button>`)
      return items.join("")
    }

      if(panel) return panel
      panel = document.createElement("div")
      panel.id = "emojiPickerPanel"
      panel.className = "emojiPicker hidden"
      document.body.appendChild(panel)
      return panel
    }

    function openEmojiPicker(ticketId, commentId, anchorEl){
      activeEmojiPicker = { ticketId, commentId }
      const panel = getEmojiPickerPanel()
      panel.innerHTML = `
        <div class="inline" style="justify-content:space-between;margin-bottom:8px">
          <strong>Seleccioná un emoji</strong>
          <button class="ghost" style="padding:4px 8px" onclick="closeEmojiPicker()">Cerrar</button>
        </div>
        <div class="emojiGrid">${EMOJI_PICKER_LIST.map(emoji => `<button class="emojiBtn" onclick="selectReactionEmoji('${htmlEscape(emoji)}')">${htmlEscape(emoji)}</button>`).join("")}</div>
      `
      panel.classList.remove("hidden")
      const rect = anchorEl?.getBoundingClientRect ? anchorEl.getBoundingClientRect() : { left: 20, top: window.innerHeight - 60 }
      requestAnimationFrame(() => {
        const h = panel.offsetHeight || 300
        const w = panel.offsetWidth || 340
        const margin = 10
        let top = rect.top - h - 8
        if(top < margin) top = Math.min(window.innerHeight - h - margin, rect.bottom + 8)
        let left = rect.left
        if(left + w > window.innerWidth - margin) left = window.innerWidth - w - margin
        if(left < margin) left = margin
        panel.style.top = `${Math.max(margin, top)}px`
        panel.style.left = `${left}px`
      })
    }

    function closeEmojiPicker(){
      activeEmojiPicker = null
      const panel = document.getElementById("emojiPickerPanel")
      if(panel) panel.classList.add("hidden")
    }

      if(ev.key !== "Enter" || ev.shiftKey) return
      const node = ev.target || document.activeElement
      const inList = !!(node && node.closest && node.closest('li'))

    function onTicketDragStart(event, ticketId){
      draggedTicketId = ticketId
      if(event?.dataTransfer) event.dataTransfer.setData("text/plain", ticketId)
      if(event?.currentTarget) event.currentTarget.classList.add("dragging")

      if(event?.currentTarget) event.currentTarget.classList.remove("dragging")

      event.preventDefault()
      event.currentTarget.classList.add('dropTarget')

    async function onColumnDrop(event, status){
      event.preventDefault()
      event.currentTarget.classList.remove('dropTarget')
      const ticketId = draggedTicketId || event?.dataTransfer?.getData("text/plain") || ""
      if(!ticketId) return
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket || ticket.status === status) return
      if(!(currentRole === "admin" || currentRole === "analista")) return
      const updated = { ...ticket, status, updatedAt: new Date().toISOString(), updatedBy: currentUser.email }
      showToast("Moviendo ticket...", "info", 1400)
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id: ticketId, ...updated })
      await logActivity("ticket_movido", { ticketId, nextStatus: status, fromStatus: ticket.status, source: "drag_drop" })
      const ix = cachedTickets.findIndex(t => t.id === ticketId)
      if(ix >= 0) cachedTickets[ix] = updated
      renderTicketsFromData(cachedTickets)
      await loadDashboard()
      showToast("Ticket movido correctamente", "ok")
    }

    function refreshLiveTimerText(ticketId){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return
      const users = ticket.timeTracking?.users || {}
      Object.entries(users).forEach(([uk, userTrack]) => {
        const liveEl = document.getElementById(`timer-live-${ticketId}-${uk}`)
        const btn = document.getElementById(`timer-toggle-${ticketId}-${uk}`)
        if(!liveEl) return
        const running = !!userTrack?.timerStartAt
        if(btn) btn.textContent = running ? '🕒 Parar timer' : '🕒 Iniciar timer'
        if(running){
          const elapsed = Math.max(0, Math.floor((Date.now() - new Date(userTrack.timerStartAt).getTime())/1000))
          const hh = String(Math.floor(elapsed/3600)).padStart(2,'0')
          const mm = String(Math.floor((elapsed%3600)/60)).padStart(2,'0')
          const ss = String(elapsed%60).padStart(2,'0')
          liveEl.textContent = `🕒 ${hh}:${mm}:${ss}`
        }else liveEl.textContent = '🕒 00:00:00'
      })
    }

    function setupLiveTimer(ticketId){
      clearInterval(ticketTimerIntervals[ticketId])
      refreshLiveTimerText(ticketId)
      ticketTimerIntervals[ticketId] = setInterval(()=> refreshLiveTimerText(ticketId), 1000)
    }

    function clearLiveTimer(ticketId){
      clearInterval(ticketTimerIntervals[ticketId])
      delete ticketTimerIntervals[ticketId]
    }

    async function assignHelperFromDropdown(ticketId){
      const email = (document.getElementById(`helper-analyst-${ticketId}`)?.value || '').trim().toLowerCase()
      if(!email) return alert('Seleccioná un analista')
      await addHelperToTicket(ticketId, email)
    }

    async function joinAsAnalyst(ticketId){
      if(currentRole !== 'analista' && currentRole !== 'admin') return alert('Solo analista o admin')
      await addHelperToTicket(ticketId, (currentUser?.email||'').toLowerCase())
    }

    async function removeHelperFromTicket(id, userKey){
      if(!(currentRole === 'admin' || currentRole === 'analista')) return
      const ticket = cachedTickets.find(t => t.id === id); if(!ticket) return
      const users = { ...((ticket.timeTracking||{}).users || {}) }

    async function startTicketTimerForUser(ticketId, userKey){
      await applyTimeUpdate(ticketId, (tracking)=>{
        const u = tracking.users[userKey] || { email: currentUser.email, totalMinutes:0, timerStartAt:'' }
        if(!u.timerStartAt) u.timerStartAt = new Date().toISOString()
        tracking.users[userKey] = u
      })
      showToast('Timer iniciado','ok')
    }

    async function stopTicketTimerForUser(ticketId, userKey, monthKey){
      const ticket = cachedTickets.find(t => t.id === ticketId); if(!ticket) return
      const u = (ticket.timeTracking?.users||{})[userKey] || {}
      if(!u.timerStartAt) return alert('El timer no está iniciado')
      const elapsed = Math.max(1, Math.round((Date.now() - new Date(u.timerStartAt).getTime())/60000))
      const acceptClock = confirm(`Tiempo medido: ${elapsed} min. ¿Cargar este tiempo del reloj?`)
      let minutes = elapsed
      if(!acceptClock){
        const manual = Number(prompt('Ingresá minutos manuales:', String(elapsed)) || 0)
        if(manual <= 0) return
        minutes = manual
      }
      await applyTimeUpdate(ticketId, (tracking)=>{
        const curr = tracking.users[userKey] || { email: currentUser.email, totalMinutes:0, timerStartAt:'' }
        curr.totalMinutes = Number(curr.totalMinutes||0) + minutes
        curr.timerStartAt = ''
        tracking.users[userKey] = curr
      }, { monthKey, minutes, analyst: currUserEmailByKey(ticket, userKey) })
      showToast('Tiempo cargado','ok')
    }

    function toLocalDateOnly(date){
      const y = date.getFullYear()
      const m = String(date.getMonth()+1).padStart(2,'0')
      const d = String(date.getDate()).padStart(2,'0')
      return `${y}-${m}-${d}`
    }

    function businessDaysBetweenArg(today, target){
      const start = new Date(today.getFullYear(), today.getMonth(), today.getDate())
      const end = new Date(target.getFullYear(), target.getMonth(), target.getDate())
      if(Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return null
      if(end < start) return 0
      let count = 0
      const day = new Date(start)
      while(day <= end){
        const dow = day.getDay()
        if(dow !== 0 && dow !== 6) count++
        day.setDate(day.getDate()+1)
      }
      return Math.max(0, count-1)
    }

    async function requestDeadlineChangeFromDashboard(ticketId, triggerEl){
      const ticket = cachedTickets.find(t => t.id === ticketId)
      if(!ticket) return alert("No se encontró el ticket")
      if(currentRole !== "analista") return alert("Solo analista puede solicitar cambio de deadline desde actividad")
      const currentValue = ticket.deadline || toLocalDateOnly(new Date())
      const requestedDeadline = await pickDateFromCalendar(currentValue, triggerEl)
      if(!requestedDeadline) return
      const comments = { ...(ticket.comments || {}) }
      const autoMessage = `Solicitud automática: ${currentUser.email} solicita cambio de deadline a ${requestedDeadline} para revisión del consultor.`
      const duplicated = Object.values(comments).some(c => String(c?.message||'').trim() === autoMessage && String(c?.author||'').toLowerCase() === String(currentUser.email||'').toLowerCase())
      if(!duplicated) comments[generateId()] = { message: autoMessage, author: currentUser.email, createdAt: new Date().toISOString(), internal: false, maximumAttention: true }
      const updated = {
        ...ticket,
        requestedDeadline,
        deadlineChangeStatus: "pending",
        deadlineChangeRequestedBy: currentUser.email,
        deadlineChangeRequestedAt: new Date().toISOString(),
        deadlineChangeReviewedBy: "",
        comments,
        updatedAt: new Date().toISOString(),
        updatedBy: currentUser.email
      }
      await db.ref("tickets").child(ticket.dbKey || emailKey(ticket.id)).update(updated)
      mirrorToSheet("updateTicket", { id: ticketId, ...updated })
      const ix = cachedTickets.findIndex(t => t.id === ticketId)
      if(ix >= 0) cachedTickets[ix] = updated
      await logActivity("deadline_change_requested", { ticketId, requestedDeadline, source: "analyst_dashboard" })
      await logActivity("ticket_comentario", { ticketId, source: "deadline_request_auto_comment" })
      await loadDashboard()
      showToast("Solicitud enviada al consultor", "ok")
    }

    function formatDateDMY(value){
      if(!value) return "-"
      const d = new Date(`${value}T00:00:00`)
      if(Number.isNaN(d.getTime())) return htmlEscape(String(value))
      const dd = String(d.getDate()).padStart(2,'0')
      const mm = String(d.getMonth()+1).padStart(2,'0')
      const yy = d.getFullYear()
      return `${dd}/${mm}/${yy}`
    }

    async function pickDateFromCalendar(defaultValue, anchorEl){
      return await new Promise((resolve)=>{
        const input = document.createElement('input')
        input.type = 'date'
        input.value = defaultValue || ''
        input.style.position = 'fixed'
        input.style.opacity = '1'
        input.style.zIndex = '9999'
        input.style.pointerEvents = 'auto'
        const r = anchorEl?.getBoundingClientRect ? anchorEl.getBoundingClientRect() : null
        if(r){
          input.style.left = `${Math.max(8, Math.round(r.left))}px`
          input.style.top = `${Math.max(8, Math.round(r.bottom + 4))}px`
        }else{
          input.style.left = '16px'
          input.style.top = '16px'
        }
        document.body.appendChild(input)
        let resolved = false
        const done = () => {
          if(resolved) return
          resolved = true
          const val = (input.value || '').trim()
          input.remove()
          resolve(val || null)
        }
        input.addEventListener('change', done, { once:true })
        input.addEventListener('blur', ()=>setTimeout(done,150), { once:true })
        if(input.showPicker) input.showPicker(); else input.click()
        input.focus()
      })
    }

    function renderDashboardList(label, tickets){
      const container = document.getElementById("dashboardTicketList")
      if(!container) return
      if(!tickets?.length){
        container.innerHTML = `<div class="small">${htmlEscape(label)}: sin tickets.</div>`
        return
      }
      const topTickets = tickets.slice(0,2)
      container.innerHTML = `
        <div class="small" style="margin-bottom:6px"><strong>${htmlEscape(label)}</strong> (${tickets.length})</div>
        <div class="dashboardListScroll">
          ${topTickets.map(t => `<div class="feedItem" style="cursor:pointer" onclick="openTicketDetailModal('${t.id}')"><div class="feedType">${htmlEscape(t.id||"-")} · ${htmlEscape(t.title||"-")}</div><div class="feedMeta">${htmlEscape(t.client||"-")} ${t.deadline ? `· Deadline ${htmlEscape(t.deadline)}` : ""}</div></div>`).join("")}
          ${tickets.slice(2).map(t => `<div class="feedItem" style="cursor:pointer" onclick="openTicketDetailModal('${t.id}')"><div class="feedType">${htmlEscape(t.id||"-")} · ${htmlEscape(t.title||"-")}</div><div class="feedMeta">${htmlEscape(t.client||"-")} ${t.deadline ? `· Deadline ${htmlEscape(t.deadline)}` : ""}</div></div>`).join("")}
        </div>
      `
    }

    function showDashboardList(type){
      const map = {
        urgent: "Tickets urgentes",
        problems: "Tickets con problemas",
        near_deadline: "Tickets a 3 días de deadline",
        unassigned: "Pendientes por asignar",
        doing: "Tickets en curso",
        pending_messages: "Tickets con mensajes pendientes"
      }
      renderDashboardList(map[type] || "Tickets", dashboardListCache[type] || [])
    }

    async function loadDashboard(){
      try{
        let ticketsArr = cachedTickets || []
        if(!ticketsArr.length){
          try{ ticketsArr = await fetchTicketsFromDb() }catch(_){ ticketsArr = [] }
        }
        const normalizedTickets = ticketsArr.map(t => ({ ...t, comments: parseCommentsValue(t.comments) }))

        let users = Object.values(cachedUsersByEmail || {})
        if(!users.length){
          try{ users = Object.values((await db.ref("users_by_email").once("value")).val() || {}) }catch(_){ users = [] }
        }

        let activity = latestActivityLogs || []
        if(!activity.length){
          try{ activity = Object.values((await db.ref("activity_logs").limitToLast(30).once("value")).val() || {}) }catch(_){ activity = [] }
        }

        const kpiSource = currentRole === "consultor"
          ? normalizedTickets.filter(t => String(t.informer||t.createdBy||"").toLowerCase() === String(currentUser?.email||"").toLowerCase())
          : normalizedTickets
        const nearDeadlineTickets = kpiSource.filter(t => {
          if(!t.deadline) return false
          const businessDays = businessDaysBetweenArg(new Date(), new Date(`${t.deadline}T00:00:00`))
          return businessDays >= 0 && businessDays <= 3
        })
        const unassignedTickets = kpiSource.filter(t => t.status === "unassigned")
        const doingTickets = kpiSource.filter(t => t.status === "doing")
        const problemTickets = kpiSource.filter(t => t.hasProblem)
        const urgentTickets = kpiSource.filter(t => t.urgentRequested)
        const pendingMessageTickets = currentRole === "consultor"
          ? kpiSource.filter(t => unreadCommentsCount(t) > 0)
          : []

        const kpiUnassigned = document.getElementById("kpiUnassigned")
        const kpiDoing = document.getElementById("kpiDoing")
        const kpiProblems = document.getElementById("kpiProblems")
        const kpiUrgent = document.getElementById("kpiUrgent")
        const kpiNearDeadline = document.getElementById("kpiNearDeadline")
        const kpiPendingMessages = document.getElementById("kpiPendingMessages")
        if(kpiUnassigned) kpiUnassigned.innerText = unassignedTickets.length
        if(kpiDoing) kpiDoing.innerText = doingTickets.length
        if(kpiProblems) kpiProblems.innerText = problemTickets.length
        if(kpiUrgent) kpiUrgent.innerText = urgentTickets.length
        if(kpiNearDeadline) kpiNearDeadline.innerText = nearDeadlineTickets.length
        if(kpiPendingMessages) kpiPendingMessages.innerText = pendingMessageTickets.length

        dashboardListCache = {
          urgent: urgentTickets,
          problems: problemTickets,
          near_deadline: nearDeadlineTickets,
          unassigned: unassignedTickets,
          doing: doingTickets,
          pending_messages: pendingMessageTickets
        }
        showDashboardList(currentRole === "consultor" ? "pending_messages" : "urgent")

        if(currentRole === "consultor") {
          const onlyMine = normalizedTickets.filter(t => String(t.informer||t.createdBy||"").toLowerCase() === String(currentUser.email||"").toLowerCase())
          const roleByEmail = Object.fromEntries(users.map(u => [String(u.email||"").toLowerCase(), u.role]))

          const commentsContainer = document.getElementById("consultorCommentsActivity")
          if(commentsContainer){
            const comments = onlyMine.flatMap(t => Object.values(t.comments||{}).filter(c => !c?.internal).map(c => ({ ticketId: t.id, ticketTitle: t.title, ...c })))
              .filter(c => { const r = roleByEmail[String(c.author||"").toLowerCase()]; return r === "admin" || r === "analista" })
              .sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))
            commentsContainer.innerHTML = comments.length
              ? comments.map(c => `<div class="feedItem" style="cursor:pointer" onclick="openTicketDetailModal('${c.ticketId||"-"}')"><div class="feedType">${htmlEscape(c.author||"-")}</div><div class="feedMeta">${htmlEscape(c.message||"")}<br>(${htmlEscape(c.ticketId||"-")} · ${htmlEscape(c.ticketTitle||"-")}) ${c.createdAt ? "· " + new Date(c.createdAt).toLocaleString() : ""}</div></div>`).join("")
              : `<p class="small">Sin comentarios aún.</p>`
          }

          const reqContainer = document.getElementById("consultorDeadlineRequests")
          if(reqContainer){
            const pending = onlyMine.filter(t => t.deadlineChangeStatus === 'pending')
            reqContainer.innerHTML = pending.length
              ? pending.map(t => `<div class="feedItem"><div class="feedTop"><div><div class="feedType">${htmlEscape(t.id||"-")} · ${htmlEscape(t.title||"-")}</div><div class="feedMeta">Nueva fecha solicitada: ${htmlEscape(t.requestedDeadline||"-")}</div></div><div class="inline" style="gap:6px"><button class="ghost" onclick="applyDeadlineDecision('${t.id}', true)">Aprobar</button><button class="danger" onclick="applyDeadlineDecision('${t.id}', false)">Rechazar</button></div></div></div>`).join("")
              : `<p class="small">Sin solicitudes pendientes.</p>`
          }
          setConsultorActivityTab(consultorActivityTab)
          return
        }

        const container = document.getElementById(currentRole === "admin" ? "adminRecentActivity" : "recentActivity")
        if(!container) return
        let sorted = activity.sort((a,b)=>new Date(b.timestampIso||0)-new Date(a.timestampIso||0))
        if(currentRole === "analista"){
          const myTickets = normalizedTickets.filter(t => String(t.assignedTo||"").toLowerCase() === String(currentUser.email||"").toLowerCase())
          const myTicketIds = new Set(myTickets.map(t => t.id))
          const roleByEmail = Object.fromEntries(users.map(u => [String(u.email||"").toLowerCase(), u.role]))
          sorted = sorted.filter(it => it.eventType === "ticket_comentario" && myTicketIds.has(it.ticketId) && roleByEmail[String(it.email||"").toLowerCase()] === "consultor")

          if(!sorted.length) container.innerHTML = `<p class="small">Sin comentarios recientes.</p>`
          else{
            container.innerHTML = sorted.map(it => `
              <div class="feedItem" style="cursor:pointer" onclick="openTicketDetailModal('${it.ticketId||"-"}')">
                <div class="feedTop">
                  <div>
                    <div class="feedType">Comentario reciente</div>
                    <div class="feedMeta">${htmlEscape(it.email || "sin-usuario")} · ${it.timestampIso ? new Date(it.timestampIso).toLocaleString() : ""}</div>
                  </div>
                  <span class="badge">${htmlEscape(it.ticketId || "-")}</span>
                </div>
              </div>
            `).join("")
          }

          const today = new Date()
          const calculated = myTickets
            .map(t => {
              const businessDays = t.deadline ? businessDaysBetweenArg(today, new Date(`${t.deadline}T00:00:00`)) : null
              return { ticket: t, businessDays }
            })
            .sort((a,b)=> (a.businessDays ?? 9999) - (b.businessDays ?? 9999))

          const alertsContainer = document.getElementById("recentActivityAlerts")
          if(alertsContainer){
            const alerts = calculated.filter(x => x.ticket.urgentRequested)
            alertsContainer.innerHTML = alerts.length
              ? alerts.map(({ticket}) => `
                  <div class="feedItem">
                    <div class="feedTop">
                      <div>
                        <div class="feedType">${htmlEscape(ticket.id||"-")} · ${htmlEscape(ticket.title||"-")}</div>
                        <div class="feedMeta">🚨 Alerta urgente marcada por consultor.</div>
                      </div>
                    </div>
                  </div>
                `).join("")
              : `<p class="small">Sin alertas urgentes.</p>`
          }

          const deadlinesContainer = document.getElementById("recentActivityDeadlines")
          if(deadlinesContainer){
            const deadlines = calculated.filter(x => x.businessDays !== null && x.businessDays <= 5)
            deadlinesContainer.innerHTML = deadlines.length
              ? deadlines.map(({ticket, businessDays}) => `
                  <div class="feedItem">
                    <div class="feedTop">
                      <div>
                        <div class="feedType">${htmlEscape(ticket.id||"-")} · ${htmlEscape(ticket.title||"-")}</div>
                        <div class="feedMeta">Deadline: ${htmlEscape(ticket.deadline||"-")} · Faltan ${businessDays} día(s) hábil(es) ARG</div>
                      </div>
                      <button class="ghost" onclick="requestDeadlineChangeFromDashboard('${ticket.id}', this)">Solicitar cambio de deadline</button>
                    </div>
                  </div>
                `).join("")
              : `<p class="small">Sin tickets cerca de deadline.</p>`
          }
          setAnalystActivityTab(analystActivityTab)
          return
        }
        if(!sorted.length){
          container.innerHTML = `<p class="small">Sin actividad reciente.</p>`
        }else{
          container.innerHTML = sorted.map(it => `
            <div class="feedItem">
              <div class="feedTop">
                <div>
                  <div class="feedType">${htmlEscape(it.eventType || "evento")}</div>
                  <div class="feedMeta">${htmlEscape(it.email || "sin-usuario")} · ${it.timestampIso ? new Date(it.timestampIso).toLocaleString() : ""}</div>
                </div>
                <span class="badge ${it.role === "admin" ? "ok" : "off"}">${htmlEscape(it.role || "-")}</span>
              </div>
            </div>
          `).join("")
        }
      }catch(err){ console.error("Error loadDashboard", err) }
    }

    async function ensureDefaultClients(){
      const samples = ["Cliente de prueba 1.", "Cliente de prueba 2."]
      const clients = Object.values((await db.ref("clients").once("value")).val() || {})
      for(const name of samples){
        const exists = clients.some(c => (c.name||"") === name)
        if(!exists){
          await db.ref("clients").child(emailKey(name)).set({ name, createdAt: new Date().toISOString(), createdBy: "system" })
          mirrorToSheet("upsertClient", { key: emailKey(name), name, createdAt: new Date().toISOString(), createdBy: "system" })
        }
      }
    }

    async function init(){
      try{
        applyTheme()
        await ensureDefaultUsers()
        await ensureDefaultClients()
        const savedEmail = (localStorage.getItem("sessionUserEmail") || "").trim().toLowerCase()
        const savedRole = (localStorage.getItem("sessionUserRole") || "").trim().toLowerCase()
        if(savedEmail){
          const user = await getUserFromDb(savedEmail)
          if(user && user.active !== false){
            currentUser = { email: user.email }
            currentRole = user.role || savedRole || "consultor"
            persistSession()
            renderApp()
          }else{
            clearSession()
            renderLogin()
          }
        }else{
          renderLogin()
        }
      }catch(err){
        console.error("Error en inicialización:", err)
        renderLogin()
        showToast("La app inició con advertencias. Revisá la consola.", "error", 3000)
      }
    }

    init()
  </script>
